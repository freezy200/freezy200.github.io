<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PagooTalk — Современный мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2e0854 0%, #180b30 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, #ff007f, #7928ca);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .nav-links a {
            color: #e0e0e0;
            text-decoration: none;
            margin-left: 30px;
            transition: color 0.3s;
            font-size: 15px;
        }

        .nav-links a:hover {
            color: #ff007f;
        }

        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px 20px;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: rgba(255, 0, 127, 0.15);
            border-radius: 50%;
            filter: blur(100px);
            top: 20%;
            left: 10%;
            z-index: 0;
        }

        .hero::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(121, 40, 202, 0.2);
            border-radius: 50%;
            filter: blur(90px);
            bottom: 10%;
            right: 10%;
            z-index: 0;
        }

        .content {
            text-align: center;
            max-width: 800px;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
            background: linear-gradient(to right, #ffffff, #e0b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 20px;
            color: #b3a2c7;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .buttons-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 16px 36px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff007f, #7928ca);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ff007f;
            transform: translateY(-2px);
        }

        footer {
            padding: 30px;
            text-align: center;
            font-size: 14px;
            color: #6a518a;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(15, 7, 32, 0.5);
        }

        @media (max-width: 768px) {
            header {
                padding: 20px;
            }
            .nav-links {
                display: none;
            }
            h1 {
                font-size: 38px;
            }
            .subtitle {
                font-size: 16px;
            }
            .btn {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PagooTalk</div>
        <nav class="nav-links">
            <a href="#features">Возможности</a>
            <a href="#about">О нас</a>
        </nav>
    </header>

    <main class="hero">
        <div class="content">
            <h1>Общайтесь без границ и ограничений</h1>
            <p class="subtitle">PagooTalk — это быстрый, безопасный и стильный мессенджер нового поколения. Будьте на связи с близкими и коллегами в любое время.</p>
            <div class="buttons-container">
                <a href="web.html" class="btn btn-primary">Открыть Web-версию</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; PagooTalk. Все права защищены.</p>
    </footer>
</body>
</html>
