<script>
(function () {
"use strict";

if (!Array.prototype.indexOf) {
Array.prototype.indexOf = function(elt) {
var len = this.length >>> 0;
var from = Number(arguments[1]) || 0;
from = (from < 0) ? Math.ceil(from) : Math.floor(from);
if (from < 0) from += len;
for (; from < len; from++) {
if (from in this && this[from] === elt) return from;
}
return -1;
};
}

if (!window.navigator.clipboard) {
window.navigator.clipboard = {
writeText: function(text) {
return {
then: function(callback) {
var textArea = document.createElement("textarea");
textArea.value = text;
textArea.style.position = "fixed";
document.body.appendChild(textArea);
textArea.select();
try { document.execCommand('copy'); if (callback) callback(); } catch (err) {}
document.body.removeChild(textArea);
}
};
}
};
}

if (!window.MediaRecorder) {
window.MediaRecorder = function(stream) {
this.stream = stream;
this.state = "inactive";
this.ondataavailable = null;
this.onstop = null;
};
window.MediaRecorder.prototype.start = function() {
this.state = "recording";
var self = this;
var AudioCtx = window.AudioContext || window.webkitAudioContext;
if (AudioCtx) {
this.audioContext = new AudioCtx();
this.source = this.audioContext.createMediaStreamSource(this.stream);
this.processor = this.audioContext.createScriptProcessor(4096, 1, 1);
this.source.connect(this.processor);
this.processor.connect(this.audioContext.destination);
this.chunks = [];
this.processor.onaudioprocess = function(e) {
if (self.state !== "recording") return;
var data = e.inputBuffer.getChannelData(0);
var length = data.length;
var buf = new Int16Array(length);
for (var i = 0; i < length; i++) {
var s = Math.max(-1, Math.min(1, data[i]));
buf[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
}
self.chunks.push(buf);
};
}
};
window.MediaRecorder.prototype.stop = function() {
this.state = "inactive";
if (this.processor) { this.processor.disconnect(); this.source.disconnect(); }
if (this.audioContext) { this.audioContext.close(); }
if (this.ondataavailable && this.chunks) {
var blob = new Blob(this.chunks, { type: 'audio/wav' });
this.ondataavailable({ data: blob });
}
if (this.onstop) this.onstop();
};
}

var MAX_FILE_SIZE = 67 * 1024 * 1024;
var MAX_MESSAGES_PER_CHAT = 500;
var MAX_LOCALSTORAGE_MB = 4.5;
var SPAM_THRESHOLD_PER_MINUTE = 30;
var SPAM_BLOCK_DURATION = 5000;

var myId = null;
var myProfile = null;
var chats = {};
var activeChatId = null;
var groupInvites = {};
var localStream = null;
var isMicMuted = false;
var isCamOff = false;
var currentCallType = null;
var spamCounters = {};
var isSpamBlocked = false;
var storageCleanupScheduled = false;
var renderQueued = false;
var searchQuery = "";

var voiceRecorder = null;
var voiceChunks = [];
var isVoiceRecording = false;

var activePeers = {};

var iceServersConfig = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun.services.mozilla.com' }
  ]
};

function $(id) { return document.getElementById(id); }
function qs(sel, root) { return (root || document).querySelector(sel); }

var Utils = {
setCookie: function (name, value, days) {
var d = new Date();
d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + d.toUTCString() + ";path=/";
},
getCookie: function (name) {
var match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
return match ? decodeURIComponent(match[2]) : null;
},
generateID: function () {
var d = function () { return Math.floor(Math.random() * 10).toString(); };
var L = function () { return String.fromCharCode(97 + Math.floor(Math.random() * 26)); };
return d() + L() + L() + L() + L() + "-" + L() + d() + L() + L() + L() + "-" + L() + L() + d() + L() + L() + "-" + L() + L() + L() + d() + L() + "-" + L() + L() + L() + L() + d();
},
validateName: function (name) {
var trimmed = name.trim();
if (trimmed.length === 0) return false;
return true;
},
validateUsername: function (username) {
if (!username || username.trim().length === 0) return true;
var u = username.trim();
if (u.charAt(0) === "@") u = u.substring(1);
return /^[a-zA-Z0-9_]{2,30}$/.test(u);
},
formatUsername: function (username) {
if (!username || username.trim().length === 0) return "";
var u = username.trim();
if (u.charAt(0) !== "@") u = "@" + u;
return u;
},
objectValues: function (obj) {
if (!obj) return [];
var keys = Object.keys(obj);
var values = [];
for (var i = 0; i < keys.length; i++) values.push(obj[keys[i]]);
return values;
},
safeJsonParse: function (str, fallback) {
try { return JSON.parse(str); } catch (e) { return fallback; }
}
};

var Storage = {
safeSetItem: function (key, value) {
try {
localStorage.setItem(key, value);
var sizeMB = Storage.getSize() / (1024 * 1024);
if (sizeMB > MAX_LOCALSTORAGE_MB) {
Storage.scheduleCleanup();
}
} catch (e) {
Storage.scheduleCleanup();
}
},
getSize: function () {
var size = 0;
try {
for (var key in localStorage) {
if (Object.prototype.hasOwnProperty.call(localStorage, key)) {
size += localStorage[key].length + key.length;
}
}
} catch (e) {}
return size * 2;
},
scheduleCleanup: function () {
if (storageCleanupScheduled) return;
storageCleanupScheduled = true;
setTimeout(function () {
Storage.cleanup();
storageCleanupScheduled = false;
}, 1000);
},
cleanup: function () {
try {
var sizeMB = Storage.getSize() / (1024 * 1024);
if (sizeMB <= MAX_LOCALSTORAGE_MB) return;
if (!chats) return;
var keys = Object.keys(chats);
keys.sort(function (a, b) {
return (chats[a].lastActivity || 0) - (chats[b].lastActivity || 0);
});
for (var i = 0; i < keys.length; i++) {
var chatId = keys[i];
var oldMsgs = chats[chatId].messages;
if (oldMsgs && oldMsgs.length > 50) {
chats[chatId].messages = oldMsgs.slice(-50);
Storage.saveChats();
if (Storage.getSize() / (1024 * 1024) < MAX_LOCALSTORAGE_MB) break;
}
}
} catch (e) {}
},
saveChats: function () {
Storage.safeSetItem("pagootalk_chats", JSON.stringify(chats || {}));
},
saveProfile: function () {
Storage.safeSetItem("pagootalk_profile", JSON.stringify(myProfile || {}));
},
saveInvites: function () {
Storage.safeSetItem("pagootalk_invites", JSON.stringify(groupInvites || {}));
},
load: function () {
try {
myProfile = Utils.safeJsonParse(localStorage.getItem("pagootalk_profile"), null);
chats = Utils.safeJsonParse(localStorage.getItem("pagootalk_chats"), {});
groupInvites = Utils.safeJsonParse(localStorage.getItem("pagootalk_invites"), {});
if (!chats) chats = {};
if (!groupInvites) groupInvites = {};
} catch (e) {
myProfile = null;
chats = {};
groupInvites = {};
}
}
};

var SpamFilter = {
check: function (senderId) {
var now = new Date().getTime();
if (!spamCounters[senderId]) {
spamCounters[senderId] = { count: 0, windowStart: now };
}
var counter = spamCounters[senderId];
if (now - counter.windowStart > 60000) {
counter.count = 0;
counter.windowStart = now;
}
counter.count++;
if (counter.count > SPAM_THRESHOLD_PER_MINUTE) {
isSpamBlocked = true;
$("spam-warning").className = "spam-warning active";
setTimeout(function () {
isSpamBlocked = false;
$("spam-warning").className = "spam-warning";
counter.count = 0;
counter.windowStart = new Date().getTime();
}, SPAM_BLOCK_DURATION);
return false;
}
return true;
}
};

var ChatManager = {
trimMessages: function (chatId) {
if (chats && chats[chatId] && chats[chatId].messages && chats[chatId].messages.length > MAX_MESSAGES_PER_CHAT) {
chats[chatId].messages = chats[chatId].messages.slice(-MAX_MESSAGES_PER_CHAT);
}
},
addMessage: function (msg) {
if (!chats || !chats[activeChatId]) return;
if (!chats[activeChatId].messages) chats[activeChatId].messages = [];
chats[activeChatId].messages.push(msg);
ChatManager.trimMessages(activeChatId);
chats[activeChatId].lastActivity = new Date().getTime();
Storage.saveChats();
UI.scheduleRender();
UI.renderChatList();
},
getLastMessageText: function (chat) {
if (!chat || !chat.messages || chat.messages.length === 0) return "Нет сообщений";
var last = chat.messages[chat.messages.length - 1];
if (last.type === "file") {
return "🎙️ Голосовое сообщение";
}
return last.text || "";
}
};

var NetworkManager = {
  createPeer: function (targetChatId, isInitiator, connectionId) {
    var pKey = targetChatId + ':' + connectionId;
    if (activePeers[pKey]) {
      try { activePeers[pKey].destroy(); } catch(e) {}
    }

    var peer = new SimplePeer({
      initiator: isInitiator,
      trickle: false,
      config: iceServersConfig
    });

    peer.on('signal', function (data) {
      var packet = {
        type: 'signal',
        senderId: myId,
        senderProfile: myProfile,
        chatId: targetChatId,
        connectionId: connectionId,
        signalData: data
      };
      var rawToken = btoa(unescape(encodeURIComponent(JSON.stringify(packet))));
      $("invite-code-display").innerText = rawToken;
      $("invite-code-display").style.display = "block";
      window.navigator.clipboard.writeText(rawToken);
    });

    peer.on('connect', function () {
      if (chats[targetChatId]) {
        chats[targetChatId].status = 'connected';
        UI.renderChatList();
        if (activeChatId === targetChatId) {
          $("chat-encryption").innerText = "Подключено P2P";
          $("chat-encryption").style.color = "#16a34a";
        }
      }
    });

    peer.on('data', function (rawData) {
      var dataStr = rawData.toString();
      var packet = Utils.safeJsonParse(dataStr, null);
      if (!packet) return;

      if (!SpamFilter.check(packet.senderId)) return;

      if (packet.type === 'chat-msg') {
        if (!chats[packet.chatId]) {
          chats[packet.chatId] = {
            id: packet.chatId,
            name: packet.senderProfile ? (packet.senderProfile.firstName + ' ' + packet.senderProfile.lastName) : 'Пользователь',
            type: 'private',
            messages: [],
            lastActivity: new Date().getTime(),
            unread: 0
          };
        }
        
        var targetChat = chats[packet.chatId];
        if (!targetChat.messages) targetChat.messages = [];
        
        var isDuplicate = false;
        for (var i = 0; i < targetChat.messages.length; i++) {
          if (targetChat.messages[i].id === packet.msg.id) {
            isDuplicate = true;
            break;
          }
        }

        if (!isDuplicate) {
          targetChat.messages.push(packet.msg);
          targetChat.lastActivity = new Date().getTime();
          if (activeChatId !== packet.chatId) {
            targetChat.unread = (targetChat.unread || 0) + 1;
          }
          Storage.saveChats();
          UI.renderChatList();
          if (activeChatId === packet.chatId) {
            UI.scheduleRender();
          }
        }

        if (targetChat.type === 'group' && packet.forwarded !== true) {
          packet.forwarded = true;
          var forwardStr = JSON.stringify(packet);
          var currentKeys = Object.keys(activePeers);
          for (var k = 0; k < currentKeys.length; k++) {
            if (currentKeys[k].indexOf(packet.chatId + ':') === 0 && currentKeys[k] !== pKey) {
              var p = activePeers[currentKeys[k]];
              if (p && p.connected) {
                try { p.send(forwardStr); } catch(e) {}
              }
            }
          }
        }
      }
    });

    peer.on('close', function () {
      delete activePeers[pKey];
      if (chats[targetChatId] && targetChatId === activeChatId) {
        var hasActive = false;
        var currentKeys = Object.keys(activePeers);
        for (var k = 0; k < currentKeys.length; k++) {
          if (currentKeys[k].indexOf(targetChatId + ':') === 0) {
            hasActive = true;
            break;
          }
        }
        if (!hasActive) {
          chats[targetChatId].status = 'disconnected';
          $("chat-encryption").innerText = "Ожидание...";
          $("chat-encryption").style.color = "#ef4444";
        }
      }
      UI.renderChatList();
    });

    peer.on('error', function () {
      peer.destroy();
    });

    activePeers[pKey] = peer;
    return peer;
  },

  handleIncomingToken: function (tokenStr) {
    try {
      var cleanToken = tokenStr.trim();
      var jsonStr = decodeURIComponent(escape(atob(cleanToken)));
      var packet = JSON.parse(jsonStr);
      if (!packet || !packet.chatId) return false;

      if (packet.type === 'signal') {
        if (!chats[packet.chatId]) {
          chats[packet.chatId] = {
            id: packet.chatId,
            name: packet.senderProfile ? (packet.senderProfile.firstName + ' ' + packet.senderProfile.lastName) : 'Чат',
            type: groupInvites[packet.chatId] ? 'group' : 'private',
            messages: [],
            lastActivity: new Date().getTime(),
            unread: 0
          };
        }

        var pKey = packet.chatId + ':' + packet.connectionId;
        var peer = activePeers[pKey];
        if (!peer) {
          peer = NetworkManager.createPeer(packet.chatId, false, packet.connectionId);
        }

        peer.signal(packet.signalData);
        Storage.saveChats();
        UI.renderChatList();
        return true;
      }
    } catch (e) {
      return false;
    }
    return false;
  },

  broadcastMessage: function (chatId, msgObj) {
    var packet = {
      type: 'chat-msg',
      senderId: myId,
      senderProfile: myProfile,
      chatId: chatId,
      msg: msgObj
    };
    var packetStr = JSON.stringify(packet);
    var currentKeys = Object.keys(activePeers);
    var sentCount = 0;
    for (var i = 0; i < currentKeys.length; i++) {
      if (currentKeys[i].indexOf(chatId + ':') === 0) {
        var p = activePeers[currentKeys[i]];
        if (p && p.connected) {
          try {
            p.send(packetStr);
            sentCount++;
          } catch (e) {}
        }
      }
    }
    return sentCount;
  }
};

var UI = {
showModal: function (id) {
$(id).className = "modal-overlay active";
},
hideModal: function (id) {
$(id).className = "modal-overlay";
},
init: function () {
Storage.load();
myId = Utils.getCookie("pagootalk_my_id");
if (!myId) {
myId = Utils.generateID();
Utils.setCookie("pagootalk_my_id", myId, 365);
}
$("my-id-display").innerText = myId;
if (!myProfile || !myProfile.firstName) {
myProfile = { firstName: "Пользователь", lastName: String(myId).substring(0,4), username: "user_" + String(myId).substring(0,4) };
Storage.saveProfile();
}
UI.updateProfileDOM();
UI.renderChatList();
UI.setupListeners();
UI.scheduleRender();
},
updateProfileDOM: function () {
$("my-display-name").innerText = myProfile.firstName + " " + myProfile.lastName;
$("my-username").innerText = Utils.formatUsername(myProfile.username);
if (myProfile.avatarData) {
$("my-avatar").innerHTML = '<img src="' + myProfile.avatarData + '" alt="Avatar">';
} else {
$("my-avatar").innerText = String(myProfile.firstName).charAt(0).toUpperCase();
}
},
renderChatList: function () {
var list = $("chat-list");
list.innerHTML = "";
var chatArr = Utils.objectValues(chats);
chatArr.sort(function (a, b) { return (b.lastActivity || 0) - (a.lastActivity || 0); });
if (chatArr.length === 0) {
list.innerHTML = '<div style="text-align:center; padding:20px; color:#8b9bb4; font-size:0.8rem;">Нет активных чатов</div>';
return;
}
for (var i = 0; i < chatArr.length; i++) {
var c = chatArr[i];
var div = document.createElement("div");
div.className = "chat-item" + (activeChatId === c.id ? " active" : "");
div.setAttribute("data-id", c.id);
var initial = String(c.name).charAt(0).toUpperCase();
var lastMsgText = ChatManager.getLastMessageText(c);
var statusIndicator = "";
if (c.type === 'private') {
  statusIndicator = (c.status === 'connected') ? " <span style='color:#16a34a;font-size:0.7rem;'>●</span>" : " <span style='color:#ef4444;font-size:0.7rem;'>○</span>";
}
var html = '<div class="avatar">' + initial + '</div>' +
'<div class="chat-details">' +
'<div class="chat-name">' + c.name + statusIndicator + '</div>' +
'<div class="chat-last-msg">' + lastMsgText + '</div>' +
'</div>';
if (c.unread && c.unread > 0) {
html += '<div class="unread-badge">' + c.unread + '</div>';
}
div.innerHTML = html;
div.onclick = (function (id) {
return function () {
activeChatId = id;
if (chats[id]) chats[id].unread = 0;
Storage.saveChats();
UI.renderChatList();
UI.scheduleRender();
};
})(c.id);
list.appendChild(div);
}
},
scheduleRender: function () {
if (renderQueued) return;
renderQueued = true;
setTimeout(function () {
UI.renderChatArea();
renderQueued = false;
}, 50);
},
handleSearch: function () {
searchQuery = $("msg-search-input").value.toLowerCase();
UI.scheduleRender();
},
renderChatArea: function () {
var area = $("chat-messages");
if (!activeChatId || !chats[activeChatId]) {
$("current-chat-name").innerText = "Выберите чат";
$("chat-encryption").innerText = "E2E";
$("chat-encryption").style.color = "#16a34a";
area.innerHTML = '<div class="empty-state" id="empty-state"><p style="font-size: 1.1rem; margin-bottom: 8px;">Добро пожаловать в PagooTalk</p><p style="font-size: 0.85rem;">Выберите чат или создайте новый</p></div>';
return;
}
var c = chats[activeChatId];
$("current-chat-name").innerText = c.name;

if (c.type === 'private') {
  if (c.status === 'connected') {
    $("chat-encryption").innerText = "Подключено P2P";
    $("chat-encryption").style.color = "#16a34a";
  } else {
    $("chat-encryption").innerText = "Ожидание...";
    $("chat-encryption").style.color = "#ef4444";
  }
} else {
  $("chat-encryption").innerText = "Групповой чат";
  $("chat-encryption").style.color = "#a855f7";
}

area.innerHTML = "";
var msgs = c.messages || [];
var visibleCount = 0;

for (var i = 0; i < msgs.length; i++) {
var m = msgs[i];

if (searchQuery && m.type === "text" && m.text.toLowerCase().indexOf(searchQuery) === -1) {
  continue;
}
if (searchQuery && m.type === "file" && (!m.text || m.text.toLowerCase().indexOf(searchQuery) === -1)) {
  continue;
}

visibleCount++;
var b = document.createElement("div");
var isIncoming = m.senderId !== myId;
b.className = "message-bubble" + (isIncoming ? " incoming" : "");
var h = "";
if (isIncoming && m.senderName) {
h += '<div class="message-sender">' + m.senderName + '</div>';
}
if (m.type === "text") {
h += '<div>' + UI.escapeHTML(m.text) + '</div>';
} else if (m.type === "file") {
h += '<div class="file-attachment">' +
'<span class="file-icon">🎙️</span>' +
'<div class="file-info">' +
'<div class="file-name">Голосовое сообщение</div>' +
'<div class="file-size">' + (m.duration || "") + '</div>' +
'</div>' +
'<button class="file-download" data-url="' + m.fileData + '">Слушать</button>' +
'</div>';
if (m.text) {
h += '<div class="message-comment">' + UI.escapeHTML(m.text) + '</div>';
}
}
h += '<div class="message-time">' + (m.time || "") + '</div>';
b.innerHTML = h;
area.appendChild(b);
}

if (visibleCount === 0) {
if (searchQuery) {
area.innerHTML = '<div style="text-align:center; margin-top:40px; color:#8b9bb4; font-size:0.85rem;">Ничего не найдено</div>';
} else {
area.innerHTML = '<div style="text-align:center; margin-top:40px; color:#8b9bb4; font-size:0.85rem;">Нет сообщений. Начните общение.</div>';
}
return;
}

area.scrollTop = area.scrollHeight;
var dls = area.getElementsByClassName("file-download");
for (var j = 0; j < dls.length; j++) {
dls[j].onclick = function (e) {
var url = e.target.getAttribute("data-url");
if (url) {
var audio = new Audio(url);
audio.play();
}
};
}
},
escapeHTML: function (str) {
if (!str) return "";
return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
},
setupListeners: function () {
$("user-profile-click").onclick = function () {
$("first-name").value = myProfile.firstName || "";
$("last-name").value = myProfile.lastName || "";
$("user-username").value = myProfile.username || "";
$("profile-error").style.display = "none";
$("profile-success").style.display = "none";
UI.showModal("profile-modal");
};
$("close-profile-modal").onclick = function () { UI.hideModal("profile-modal"); };
$("save-profile-btn").onclick = function () {
var fn = $("first-name").value;
var ln = $("last-name").value;
var un = $("user-username").value;
if (!Utils.validateName(fn) || !Utils.validateName(ln)) {
$("profile-error").innerText = "Имя и фамилия не могут быть пустыми.";
$("profile-error").style.display = "block";
return;
}
if (!Utils.validateUsername(un)) {
$("profile-error").innerText = "Неверный формат юзернейма.";
$("profile-error").style.display = "block";
return;
}
myProfile.firstName = fn.trim();
myProfile.lastName = ln.trim();
myProfile.username = un.trim();
var fileInput = $("avatar-input");
if (fileInput.files && fileInput.files[0]) {
var f = fileInput.files[0];
if (f.size > MAX_FILE_SIZE) {
$("profile-error").innerText = "Файл аватарки слишком большой (макс. 67 МБ).";
$("profile-error").style.display = "block";
return;
}
var reader = new FileReader();
reader.onload = function (e) {
myProfile.avatarData = e.target.result;
Storage.saveProfile();
UI.updateProfileDOM();
$("profile-success").style.display = "block";
setTimeout(function () { UI.hideModal("profile-modal"); }, 1000);
};
reader.readAsDataURL(f);
} else {
Storage.saveProfile();
UI.updateProfileDOM();
$("profile-success").style.display = "block";
setTimeout(function () { UI.hideModal("profile-modal"); }, 1000);
}
};
$("new-chat-btn").onclick = function () {
var elId = $("new-chat-id");
var elBtn = $("add-chat-btn");
if (elId.style.display === "none") {
elId.style.display = "block";
elBtn.style.display = "block";
elId.focus();
} else {
elId.style.display = "none";
elBtn.style.display = "none";
}
};
$("add-chat-btn").onclick = function () {
var val = $("new-chat-id").value.trim();
if (!val) return;
$("new-chat-id").value = "";
if (NetworkManager.handleIncomingToken(val)) {
$("new-chat-id").style.display = "none";
$("add-chat-btn").style.display = "none";
return;
}
var targetChatId = val;
var isGroup = groupInvites[targetChatId] ? true : false;
var connId = Utils.generateID();
if (!chats[targetChatId]) {
chats[targetChatId] = {
id: targetChatId,
name: isGroup ? ("Группа " + targetChatId.substring(0, 4)) : ("Пользователь " + targetChatId.substring(0, 4)),
type: isGroup ? 'group' : 'private',
messages: [],
lastActivity: new Date().getTime(),
unread: 0
};
}
activeChatId = targetChatId;
NetworkManager.createPeer(targetChatId, true, connId);
Storage.saveChats();
UI.renderChatList();
UI.scheduleRender();
$("new-chat-id").style.display = "none";
$("add-chat-btn").style.display = "none";
};
$("new-group-btn").onclick = function () {
$("group-name").value = "";
$("invite-code-display").style.display = "none";
UI.showModal("group-modal");
};
$("close-group-modal").onclick = function () { UI.hideModal("group-modal"); };
$("create-group-btn").onclick = function () {
var gn = $("group-name").value.trim();
if (!gn) return;
var gId = "group-" + Utils.generateID();
groupInvites[gId] = { id: gId, name: gn, type: "multi" };
chats[gId] = {
id: gId,
name: gn,
type: 'group',
messages: [],
lastActivity: new Date().getTime(),
unread: 0
};
activeChatId = gId;
Storage.saveInvites();
Storage.saveChats();
UI.renderChatList();
UI.scheduleRender();
var initConnId = Utils.generateID();
NetworkManager.createPeer(gId, true, initConnId);
};
$("send-btn").onclick = function () {
if (!activeChatId || isSpamBlocked) return;
var input = $("message-input");
var text = input.value.trim();
if (!text) return;
input.value = "";
var msgObj = {
id: Utils.generateID(),
senderId: myId,
senderName: myProfile.firstName + " " + myProfile.lastName,
type: "text",
text: text,
time: new Date().toLocaleTimeString().substring(0, 5)
};
ChatManager.addMessage(msgObj);
NetworkManager.broadcastMessage(activeChatId, msgObj);
UI.renderChatArea();
};
$("message-input").onkeydown = function (e) {
if (e.keyCode === 13) {
$("send-btn").onclick();
}
};
$("copy-id-btn").onclick = function () {
window.navigator.clipboard.writeText(myId).then(function () {
$("copy-id-btn").innerText = "Copied!";
$("copy-id-btn").className = "copy-id-btn copied";
setTimeout(function () {
$("copy-id-btn").innerText = "Copy";
$("copy-id-btn").className = "copy-id-btn";
}, 2000);
});
};
$("attach-btn").onclick = function () {
if (isVoiceRecording) {
if (voiceRecorder && voiceRecorder.state !== "inactive") {
voiceRecorder.stop();
}
isVoiceRecording = false;
$("attach-btn").style.background = "";
$("attach-btn").innerText = "🎙️";
} else {
if (!window.navigator.mediaDevices || !window.navigator.mediaDevices.getUserMedia) {
alert("Запись звука не поддерживается в этом браузере или приложении.");
return;
}
window.navigator.mediaDevices.getUserMedia({ audio: true }).then(function (stream) {
voiceChunks = [];
if (window.MediaRecorder.prototype.start) {
voiceRecorder = new MediaRecorder(stream);
voiceRecorder.ondataavailable = function (e) {
if (e.data && e.data.size > 0) {
voiceChunks.push(e.data);
}
};
voiceRecorder.onstop = function () {
var blob = new Blob(voiceChunks, { type: 'audio/wav' });
var reader = new FileReader();
reader.onload = function (evt) {
var base64Data = evt.target.result;
var msgObj = {
id: Utils.generateID(),
senderId: myId,
senderName: myProfile.firstName + " " + myProfile.lastName,
type: "file",
fileData: base64Data,
duration: "Голос",
time: new Date().toLocaleTimeString().substring(0, 5)
};
ChatManager.addMessage(msgObj);
NetworkManager.broadcastMessage(activeChatId, msgObj);
};
reader.readAsDataURL(blob);
var tracks = stream.getTracks();
for (var i = 0; i < tracks.length; i++) tracks[i].stop();
};
voiceRecorder.start();
}
isVoiceRecording = true;
$("attach-btn").style.background = "#ef4444";
$("attach-btn").innerText = "⏹️";
}).catch(function () {
alert("Не удалось получить доступ к микрофону.");
});
}
};
$("btn-call-audio").onclick = function () { UI.toggleCallOverlay(true, 'audio'); };
$("btn-call-video").onclick = function () { UI.toggleCallOverlay(true, 'video'); };
$("end-call-x-btn").onclick = function () { UI.toggleCallOverlay(false); };
$("btn-end-call").onclick = function () { UI.toggleCallOverlay(false); };
},
toggleCallOverlay: function (show, type) {
var overlay = $("group-call-overlay");
if (show) {
overlay.className = "group-call-overlay active";
currentCallType = type;
$("call-title").innerText = type === 'video' ? "Видеозвонок" : "Аудиозвонок";
} else {
overlay.className = "group-call-overlay";
currentCallType = null;
if (localStream) {
var tracks = localStream.getTracks();
for (var i = 0; i < tracks.length; i++) tracks[i].stop();
localStream = null;
}
$("call-grid").innerHTML = "";
}
}
};

window.onload = function () {
UI.init();
};
})();
</script>
</body>
</html>
