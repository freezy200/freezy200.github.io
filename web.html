<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PagooTalk</title>
<script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#0a0a12}
body{display:flex;justify-content:center;align-items:center;color:#e2e8f0;
background:linear-gradient(135deg,#0a0a12 0%,#0f0f1e 30%,#0d0d20 60%,#0a0a12 100%)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes bounceIn{0%{opacity:0;transform:scale(.9)}50%{transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(0,240,255,.3)}50%{box-shadow:0 0 20px rgba(0,240,255,.6)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes gradientMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.app-container{width:100%;max-width:1440px;height:100vh;display:flex;overflow:hidden;position:relative;
background:rgba(12,12,24,.95);border:1px solid rgba(0,240,255,.06);
box-shadow:0 0 80px rgba(0,240,255,.04),0 0 200px rgba(124,58,237,.03);
animation:fadeIn .6s ease-out}

.app-container::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;
background:radial-gradient(ellipse at 20% 50%,rgba(0,240,255,.03) 0%,transparent 50%),
radial-gradient(ellipse at 80% 20%,rgba(124,58,237,.04) 0%,transparent 50%),
radial-gradient(ellipse at 60% 80%,rgba(224,64,251,.03) 0%,transparent 50%)}

.sidebar{width:340px;display:flex;flex-direction:column;position:relative;z-index:1;
background:rgba(15,15,30,.9);backdrop-filter:blur(20px);
border-right:1px solid rgba(0,240,255,.08)}

.sidebar-header{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.user-profile{display:flex;align-items:center;gap:12px;margin-bottom:12px;cursor:pointer;
padding:10px;border-radius:14px;transition:all .25s ease}
.user-profile:hover{background:rgba(0,240,255,.06)}
.user-info{flex:1;overflow:hidden;min-width:0}
.user-name-row{display:flex;align-items:baseline;gap:6px;overflow:hidden}
.user-name{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e2e8f0}
.user-username{font-size:.78rem;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:400}
.user-id-row{display:flex;align-items:center;gap:6px;margin-top:4px}
.user-id{font-size:.66rem;color:#475569;font-family:'JetBrains Mono','Consolas',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.copy-id-btn{background:rgba(0,240,255,.08);border:1px solid rgba(0,240,255,.15);border-radius:8px;
padding:3px 8px;cursor:pointer;font-size:.62rem;color:#00f0ff;transition:all .2s;white-space:nowrap;font-weight:600;letter-spacing:.3px}
.copy-id-btn:hover{background:rgba(0,240,255,.15);box-shadow:0 0 12px rgba(0,240,255,.2)}
.copy-id-btn.copied{background:rgba(34,197,94,.12);color:#22c55e;border-color:rgba(34,197,94,.3)}

.avatar{width:46px;height:46px;border-radius:50%;flex-shrink:0;overflow:hidden;font-size:1.05rem;
background:linear-gradient(135deg,#00f0ff,#7c3aed);display:flex;align-items:center;justify-content:center;
color:#fff;font-weight:700;position:relative;
box-shadow:0 0 15px rgba(0,240,255,.2),0 0 30px rgba(124,58,237,.1)}
.avatar img{width:100%;height:100%;object-fit:cover}
.edit-profile-btn{background:transparent;border:1px solid rgba(0,240,255,.15);color:#00f0ff;cursor:pointer;
font-size:.72rem;padding:4px 8px;border-radius:8px;transition:all .2s;flex-shrink:0}
.edit-profile-btn:hover{background:rgba(0,240,255,.1);box-shadow:0 0 10px rgba(0,240,255,.15)}

.action-bar{display:flex;gap:8px;margin-bottom:12px}
.btn-small{flex:1;padding:10px;border:none;border-radius:10px;cursor:pointer;
font-size:.78rem;font-weight:600;color:#fff;position:relative;overflow:hidden;
background:linear-gradient(135deg,#7c3aed,#e040fb);
transition:all .25s ease;letter-spacing:.3px}
.btn-small::before{content:'';position:absolute;top:0;left:-100%;width:200%;height:100%;
background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
transition:left .5s ease}
.btn-small:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(124,58,237,.35)}
.btn-small:hover::before{left:100%}
.btn-small:active{transform:scale(.97)}

.search-wrapper{padding:4px 16px 14px;border-bottom:1px solid rgba(255,255,255,.05)}
.search-container{position:relative;display:flex;align-items:center;
background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:0 14px;
transition:all .3s ease}
.search-container:focus-within{border-color:rgba(0,240,255,.4);
box-shadow:0 0 0 3px rgba(0,240,255,.08),0 0 20px rgba(0,240,255,.06);
background:rgba(0,0,0,.4)}
.search-icon{font-size:.85rem;color:#475569;margin-right:8px;pointer-events:none}
.search-input-field{flex:1;background:transparent;border:none;padding:10px 0;color:#e2e8f0;
outline:none;font-size:.85rem}
.search-input-field::placeholder{color:#334155}

.chat-list{flex:1;overflow-y:auto;padding:8px 10px}
.chat-item{padding:12px;border-radius:14px;cursor:pointer;display:flex;align-items:center;gap:12px;
margin-bottom:4px;transition:all .25s ease;border:1px solid transparent;
animation:slideInRight .35s ease-out}
.chat-item:hover{background:rgba(0,240,255,.04);border-color:rgba(0,240,255,.08)}
.chat-item.active{background:rgba(0,240,255,.08);border-color:rgba(0,240,255,.2);
box-shadow:0 0 20px rgba(0,240,255,.06)}
.chat-details{flex:1;overflow:hidden;min-width:0}
.chat-name{font-weight:600;font-size:.88rem;color:#e2e8f0}
.chat-last-msg{font-size:.75rem;color:#64748b;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.unread-badge{background:linear-gradient(135deg,#e040fb,#7c3aed);color:#fff;font-size:.63rem;font-weight:700;
padding:3px 8px;border-radius:10px;flex-shrink:0;animation:pulse 2s infinite;
box-shadow:0 0 12px rgba(224,64,251,.3)}

.chat-area{flex:1;display:flex;flex-direction:column;position:relative;z-index:1;
background:rgba(10,10,18,.6)}
.chat-header{padding:14px 18px;
background:rgba(15,15,30,.85);backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.05);
display:flex;justify-content:space-between;align-items:center}
.chat-header-info{display:flex;align-items:center;gap:10px;font-weight:600;color:#e2e8f0}
.chat-header-actions{display:flex;gap:8px}
.icon-btn{width:38px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.08);
cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:1rem;
background:rgba(255,255,255,.03);color:#94a3b8;transition:all .25s ease}
.icon-btn:hover{background:rgba(0,240,255,.1);color:#00f0ff;border-color:rgba(0,240,255,.3);
box-shadow:0 0 15px rgba(0,240,255,.15);transform:scale(1.05)}
.icon-btn:active{transform:scale(.95)}

.chat-messages{flex:1;padding:18px;overflow-y:auto;display:flex;flex-direction:column;
background:radial-gradient(ellipse at 50% 0%,rgba(0,240,255,.015) 0%,transparent 60%)}

.message-bubble{max-width:75%;padding:12px 16px;border-radius:18px 18px 4px 18px;
animation:slideUp .35s ease-out;position:relative;word-wrap:break-word;margin-bottom:10px;
align-self:flex-end;
background:linear-gradient(135deg,#7c3aed,#e040fb);color:#fff;
box-shadow:0 4px 15px rgba(124,58,237,.2)}
.message-bubble.incoming{align-self:flex-start;border-radius:18px 18px 18px 4px;
background:rgba(255,255,255,.06);color:#e2e8f0;
border:1px solid rgba(255,255,255,.08);
box-shadow:0 4px 15px rgba(0,0,0,.15)}
.message-sender{font-size:.7rem;color:#00f0ff;font-weight:700;margin-bottom:4px}
.message-comment{font-size:.8rem;margin-top:6px;font-style:italic;color:#94a3b8}
.message-time{font-size:.63rem;color:rgba(255,255,255,.45);margin-top:6px;text-align:right}
.message-bubble.incoming .message-time{color:#64748b}

.file-attachment{display:flex;align-items:center;gap:10px;padding:10px 12px;
background:rgba(0,240,255,.06);border-radius:12px;margin-top:8px;
border:1px solid rgba(0,240,255,.12);min-width:200px}
.file-icon{font-size:1.5rem}
.file-info{flex:1;overflow:hidden;min-width:0}
.file-name{font-weight:600;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#e2e8f0}
.file-size{font-size:.7rem;color:#64748b}
.file-download{padding:6px 12px;background:linear-gradient(135deg,#00f0ff,#7c3aed);color:#fff;border:none;
border-radius:8px;cursor:pointer;font-size:.73rem;text-decoration:none;transition:all .2s;flex-shrink:0;font-weight:600}
.file-download:hover{box-shadow:0 0 15px rgba(0,240,255,.3);transform:scale(1.05)}

.chat-input-area{padding:14px 18px;
background:rgba(15,15,30,.85);backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,.05);
display:flex;align-items:center;gap:10px}
.chat-input{flex:1;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);
padding:12px 18px;border-radius:16px;color:#e2e8f0;outline:none;font-size:.9rem;
transition:all .3s ease}
.chat-input:focus{border-color:rgba(0,240,255,.4);
box-shadow:0 0 0 3px rgba(0,240,255,.08),0 0 20px rgba(0,240,255,.06)}
.chat-input::placeholder{color:#334155}

.spam-warning{padding:8px 14px;background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);
color:#fbbf24;font-size:.8rem;text-align:center;display:none;border-radius:0}
.spam-warning.active{display:block;animation:fadeIn .3s}

#group-call-overlay{position:absolute;top:0;left:0;width:100%;height:100%;
background:rgba(8,8,16,.97);backdrop-filter:blur(30px);z-index:100;display:none;flex-direction:column}
#group-call-overlay.active{display:flex;animation:fadeIn .4s ease-out}
.call-main-area{flex:1;display:flex;flex-direction:column;padding:18px}
.call-grid{flex:1;display:flex;flex-wrap:wrap;gap:12px;padding:18px;overflow-y:auto;
justify-content:center;align-items:center;align-content:center}
.video-tile{background:#0d0d1a;border-radius:16px;overflow:hidden;position:relative;
width:48%;min-width:200px;max-width:500px;
border:1px solid rgba(0,240,255,.1);
box-shadow:0 4px 20px rgba(0,0,0,.3);animation:bounceIn .4s ease-out}
.video-tile video{width:100%;height:100%;object-fit:cover}
.video-tile .participant-name{position:absolute;bottom:10px;left:10px;
background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
color:#fff;padding:4px 10px;border-radius:8px;font-size:.8rem;font-weight:600;
border:1px solid rgba(255,255,255,.1)}
.video-tile .screen-share-badge{position:absolute;top:10px;right:10px;
background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;
padding:3px 8px;border-radius:6px;font-size:.7rem;font-weight:700}
.call-sidebar{width:100%;background:rgba(15,15,30,.9);backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,.05);display:flex;flex-direction:column;
padding:16px;max-height:200px}
.participant-list{flex:1;overflow-y:auto;margin-top:10px}
.participant-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;
margin-bottom:4px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);
transition:all .2s}
.participant-item:hover{background:rgba(0,240,255,.06);border-color:rgba(0,240,255,.12)}
.call-controls-bar{display:flex;justify-content:center;gap:14px;padding:18px;
background:rgba(15,15,30,.9);backdrop-filter:blur(20px);
border-top:1px solid rgba(255,255,255,.05)}
.control-btn{width:50px;height:50px;border-radius:50%;border:1px solid rgba(255,255,255,.1);
cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:1.2rem;
background:rgba(255,255,255,.05);color:#e2e8f0;
box-shadow:0 2px 10px rgba(0,0,0,.2);transition:all .25s ease}
.control-btn:hover{transform:scale(1.1);box-shadow:0 0 20px rgba(0,240,255,.2);
border-color:rgba(0,240,255,.3);color:#00f0ff}
.control-btn:active{transform:scale(.95)}
.control-btn.danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;
border-color:rgba(239,68,68,.4);
box-shadow:0 0 20px rgba(239,68,68,.2)}
.control-btn.muted{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;position:relative;
border-color:rgba(239,68,68,.4)}
.control-btn.muted::after{content:'/';position:absolute;font-size:1.4rem;font-weight:bold}

.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:200;
display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex;animation:fadeIn .25s ease}
.modal{background:rgba(15,15,30,.95);backdrop-filter:blur(30px);
padding:28px;border-radius:20px;width:90%;max-width:420px;
border:1px solid rgba(0,240,255,.12);
box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 40px rgba(0,240,255,.06);
text-align:center;position:relative;max-height:85vh;overflow-y:auto;
animation:bounceIn .4s ease-out}
.modal h3{margin-bottom:20px;color:#e2e8f0;padding-right:30px;font-size:1.25rem;font-weight:700}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;
border-radius:10px;border:1px solid rgba(255,255,255,.08);cursor:pointer;font-size:1rem;
background:rgba(255,255,255,.03);color:#64748b;
display:inline-flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(239,68,68,.12);color:#ef4444;border-color:rgba(239,68,68,.3)}
.modal input,.modal select{width:100%;padding:12px 14px;margin-bottom:12px;
border:1px solid rgba(255,255,255,.08);border-radius:12px;outline:none;font-size:.9rem;
font-family:inherit;background:rgba(0,0,0,.3);color:#e2e8f0;
transition:all .3s ease}
.modal input::placeholder{color:#334155}
.modal input:focus{border-color:rgba(0,240,255,.4);
box-shadow:0 0 0 3px rgba(0,240,255,.08),0 0 15px rgba(0,240,255,.06)}
.error-text{color:#ef4444;font-size:.8rem;margin-bottom:8px;display:none}
.success-text{color:#22c55e;font-size:.8rem;margin-bottom:8px;display:none}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
height:100%;animation:float 3s ease-in-out infinite}
.empty-state p:first-child{font-size:1.2rem;font-weight:700;margin-bottom:10px;
background:linear-gradient(135deg,#00f0ff,#e040fb);-webkit-background-clip:text;
-webkit-text-fill-color:transparent;background-clip:text}
.empty-state p:last-child{font-size:.88rem;color:#475569}

#invite-code-display{margin-top:14px;padding:12px;background:rgba(0,0,0,.4);border-radius:10px;
font-family:'JetBrains Mono','Consolas',monospace;display:none;font-size:.78rem;
border:1px solid rgba(0,240,255,.1);color:#00f0ff;word-break:break-all}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,240,255,.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,240,255,.3)}

@media(max-width:768px){
.app-container{flex-direction:column;height:100vh}
.sidebar{width:100%;height:40%;border-right:none;border-bottom:1px solid rgba(255,255,255,.05)}
.chat-area{height:60%}
.video-tile{width:100%;min-width:unset}
.call-sidebar{max-height:150px}
}
@media(max-width:480px){
.sidebar{height:35%}
.chat-area{height:65%}
.user-name{font-size:.82rem}
.user-username{font-size:.7rem}
.user-id{font-size:.6rem}
.copy-id-btn{padding:2px 5px;font-size:.58rem}
.chat-header-actions{gap:6px}
.icon-btn{width:34px;height:34px;font-size:.9rem}
.message-bubble{max-width:88%;padding:10px 14px;font-size:.85rem}
.file-attachment{min-width:160px}
.file-icon{font-size:1.3rem}
.file-name{font-size:.75rem}
.file-size{font-size:.65rem}
.file-download{padding:4px 8px;font-size:.7rem}
.call-controls-bar{gap:10px}
.control-btn{width:42px;height:42px;font-size:1rem}
}
</style>
</head>
<body>

<div class="modal-overlay" id="profile-modal">
<div class="modal">
<button class="modal-close" id="close-profile-modal" aria-label="Закрыть">✕</button>
<h3>Настройка профиля</h3>
<p class="error-text" id="profile-error"></p>
<p class="success-text" id="profile-success">Профиль сохранён!</p>
<input type="text" id="first-name" placeholder="Имя (только буквы, пробелы, дефисы)">
<input type="text" id="last-name" placeholder="Фамилия (только буквы, пробелы, дефисы)">
<input type="text" id="user-username" placeholder="Юзернейм (без @, например ivan_2025)" maxlength="30">
<label style="display:block;text-align:left;font-size:.78rem;color:#64748b;margin-bottom:4px;">Аватарка (макс. 67 МБ)</label>
<input type="file" id="avatar-input" accept="image/*">
<button class="btn-small" style="width:100%;padding:12px;" id="save-profile-btn">Сохранить</button>
</div>
</div>

<div class="modal-overlay" id="group-modal">
<div class="modal">
<button class="modal-close" id="close-group-modal" aria-label="Закрыть">✕</button>
<h3>Создать групповой чат</h3>
<input type="text" id="group-name" placeholder="Название группы">
<select id="invite-type" style="display:none;"><option value="multi">Многоразовая ссылка</option></select>
<button class="btn-small" style="width:100%;padding:12px;" id="create-group-btn">Создать</button>
<div id="invite-code-display"></div>
</div>
</div>

<div class="app-container">
<div class="sidebar">
<div class="sidebar-header">
<div class="user-profile" id="user-profile-click">
<div class="avatar" id="my-avatar">?</div>
<div class="user-info">
<div class="user-name-row">
<span class="user-name" id="my-display-name">Загрузка...</span>
<span class="user-username" id="my-username"></span>
</div>
<div class="user-id-row">
<span class="user-id" id="my-id-display">...</span>
<button class="copy-id-btn" id="copy-id-btn" title="Копировать ID">Copy</button>
</div>
</div>
<button class="edit-profile-btn" id="edit-profile-btn" title="Редактировать">✏️</button>
</div>
<div class="action-bar">
<button class="btn-small" id="new-chat-btn">+ Чат</button>
<button class="btn-small" id="new-group-btn">+ Группа</button>
</div>
<input type="text" id="new-chat-id" class="chat-input" style="padding:9px;font-size:.8rem;display:none;" placeholder="Введите ID пользователя или код">
<button id="add-chat-btn" class="btn-small" style="display:none;margin-top:6px;">Добавить</button>
</div>
<div class="search-wrapper">
<div class="search-container">
<span class="search-icon">🔍</span>
<input type="text" id="msg-search-input" class="search-input-field" placeholder="Поиск по сообщениям..." oninput="UI.handleSearch()">
</div>
</div>
<div class="chat-list" id="chat-list"></div>
</div>

<div class="chat-area">
<div class="chat-header">
<div class="chat-header-info" id="chat-header-clickable" style="cursor:pointer;">
<span id="current-chat-name">Выберите чат</span>
<span style="font-size:.73rem;color:#22c55e;font-weight:500;" id="chat-encryption">E2E</span>
</div>
<div class="chat-header-actions">
<button class="icon-btn" id="btn-call-audio" title="Аудиозвонок">📞</button>
<button class="icon-btn" id="btn-call-video" title="Видеозвонок">🎥</button>
<button class="icon-btn" id="btn-screen-share" style="display:none;" title="Демонстрация">🖥️</button>
</div>
</div>
<div class="spam-warning" id="spam-warning">⚠️ Слишком много сообщений. Подождите...</div>
<div class="chat-messages" id="chat-messages">
<div class="empty-state" id="empty-state">
<p>Добро пожаловать в PagooTalk</p>
<p>Выберите чат или создайте новый</p>
</div>
</div>
<div class="chat-input-area">
