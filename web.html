<script>
(function () {
"use strict";

if (!Array.prototype.indexOf) {
Array.prototype.indexOf = function(elt) {
var len = this.length >>> 0;
var from = Number(arguments[1]) || 0;
from = (from < 0) ? Math.ceil(from) : Math.floor(from);
if (from < 0) from += len;
for (; from < len; from++) {
if (from in this && this[from] === elt) return from;
}
return -1;
};
}

if (!window.navigator.clipboard) {
window.navigator.clipboard = {
writeText: function(text) {
return {
then: function(callback) {
var textArea = document.createElement("textarea");
textArea.value = text;
textArea.style.position = "fixed";
document.body.appendChild(textArea);
textArea.select();
try { document.execCommand('copy'); if (callback) callback(); } catch (err) {}
document.body.removeChild(textArea);
}
};
}
};
}

if (!window.MediaRecorder) {
window.MediaRecorder = function(stream) {
this.stream = stream;
this.state = "inactive";
this.ondataavailable = null;
this.onstop = null;
};
window.MediaRecorder.prototype.start = function() {
this.state = "recording";
var self = this;
var AudioCtx = window.AudioContext || window.webkitAudioContext;
if (AudioCtx) {
this.audioContext = new AudioCtx();
this.source = this.audioContext.createMediaStreamSource(this.stream);
this.processor = this.audioContext.createScriptProcessor(4096, 1, 1);
this.source.connect(this.processor);
this.processor.connect(this.audioContext.destination);
this.chunks = [];
this.processor.onaudioprocess = function(e) {
if (self.state !== "recording") return;
var data = e.inputBuffer.getChannelData(0);
var length = data.length;
var buf = new Int16Array(length);
for (var i = 0; i < length; i++) {
var s = Math.max(-1, Math.min(1, data[i]));
buf[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
}
self.chunks.push(buf);
};
}
};
window.MediaRecorder.prototype.stop = function() {
this.state = "inactive";
if (this.processor) { this.processor.disconnect(); this.source.disconnect(); }
if (this.audioContext) { this.audioContext.close(); }
if (this.ondataavailable && this.chunks) {
var blob = new Blob(this.chunks, { type: 'audio/wav' });
this.ondataavailable({ data: blob });
}
if (this.onstop) this.onstop();
};
}

var MAX_FILE_SIZE = 67 * 1024 * 1024;
var MAX_MESSAGES_PER_CHAT = 500;
var MAX_LOCALSTORAGE_MB = 4.5;
var SPAM_THRESHOLD_PER_MINUTE = 30;
var SPAM_BLOCK_DURATION = 5000;

var myId = null;
var myProfile = null;
var chats = {};
var activeChatId = null;
var groupInvites = {};
var localStream = null;
var screenStream = null;
var isMicMuted = false;
var isCamOff = false;
var isScreenSharing = false;
var currentCallType = null;
var spamCounters = {};
var isSpamBlocked = false;
var storageCleanupScheduled = false;
var renderQueued = false;

var voiceRecorder = null;
var voiceChunks = [];
var isVoiceRecording = false;

function $(id) { return document.getElementById(id); }
function qs(sel, root) { return (root || document).querySelector(sel); }

var Utils = {
setCookie: function (name, value, days) {
var d = new Date();
d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + d.toUTCString() + ";path=/";
},
getCookie: function (name) {
var match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
return match ? decodeURIComponent(match[2]) : null;
},
generateID: function () {
var d = function () { return Math.floor(Math.random() * 10).toString(); };
var L = function () { return String.fromCharCode(97 + Math.floor(Math.random() * 26)); };
return d() + L() + L() + L() + L() + "-" + L() + d() + L() + L() + L() + "-" + L() + L() + d() + L() + L() + "-" + L() + L() + L() + d() + L() + "-" + L() + L() + L() + L() + d();
},
validateName: function (name) {
var trimmed = name.trim();
if (trimmed.length === 0) return false;
return true;
},
validateUsername: function (username) {
if (!username || username.trim().length === 0) return true;
var u = username.trim();
if (u.charAt(0) === "@") u = u.substring(1);
return /^[a-zA-Z0-9_]{2,30}$/.test(u);
},
formatUsername: function (username) {
if (!username || username.trim().length === 0) return "";
var u = username.trim();
if (u.charAt(0) !== "@") u = "@" + u;
return u;
},
formatFileSize: function (bytes) {
if (bytes < 1024) return bytes + " Б";
if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " КБ";
return (bytes / (1024 * 1024)).toFixed(1) + " МБ";
},
objectValues: function (obj) {
if (!obj) return [];
var keys = Object.keys(obj);
var values = [];
for (var i = 0; i < keys.length; i++) values.push(obj[keys[i]]);
return values;
},
safeJsonParse: function (str, fallback) {
try { return JSON.parse(str); } catch (e) { return fallback; }
}
};

var Storage = {
safeSetItem: function (key, value) {
try {
localStorage.setItem(key, value);
var sizeMB = Storage.getSize() / (1024 * 1024);
if (sizeMB > MAX_LOCALSTORAGE_MB) {
Storage.scheduleCleanup();
}
} catch (e) {
Storage.scheduleCleanup();
}
},
getSize: function () {
var size = 0;
try {
for (var key in localStorage) {
if (Object.prototype.hasOwnProperty.call(localStorage, key)) {
size += localStorage[key].length + key.length;
}
}
} catch (e) {}
return size * 2;
},
scheduleCleanup: function () {
if (storageCleanupScheduled) return;
storageCleanupScheduled = true;
setTimeout(function () {
Storage.cleanup();
storageCleanupScheduled = false;
}, 1000);
},
cleanup: function () {
try {
var sizeMB = Storage.getSize() / (1024 * 1024);
if (sizeMB <= MAX_LOCALSTORAGE_MB) return;
if (!chats) return;
var keys = Object.keys(chats);
keys.sort(function (a, b) {
return (chats[a].lastActivity || 0) - (chats[b].lastActivity || 0);
});
for (var i = 0; i < keys.length; i++) {
var chatId = keys[i];
var oldMsgs = chats[chatId].messages;
if (oldMsgs && oldMsgs.length > 50) {
chats[chatId].messages = oldMsgs.slice(-50);
Storage.saveChats();
if (Storage.getSize() / (1024 * 1024) < MAX_LOCALSTORAGE_MB) break;
}
}
} catch (e) {}
},
saveChats: function () {
Storage.safeSetItem("pagootalk_chats", JSON.stringify(chats || {}));
},
saveProfile: function () {
Storage.safeSetItem("pagootalk_profile", JSON.stringify(myProfile || {}));
},
saveInvites: function () {
Storage.safeSetItem("pagootalk_invites", JSON.stringify(groupInvites || {}));
},
load: function () {
try {
myProfile = Utils.safeJsonParse(localStorage.getItem("pagootalk_profile"), null);
chats = Utils.safeJsonParse(localStorage.getItem("pagootalk_chats"), {});
groupInvites = Utils.safeJsonParse(localStorage.getItem("pagootalk_invites"), {});
if (!chats) chats = {};
if (!groupInvites) groupInvites = {};
} catch (e) {
myProfile = null;
chats = {};
groupInvites = {};
}
}
};

var SpamFilter = {
check: function (senderId) {
var now = new Date().getTime();
if (!spamCounters[senderId]) {
spamCounters[senderId] = { count: 0, windowStart: now };
}
var counter = spamCounters[senderId];
if (now - counter.windowStart > 60000) {
counter.count = 0;
counter.windowStart = now;
}
counter.count++;
if (counter.count > SPAM_THRESHOLD_PER_MINUTE) {
isSpamBlocked = true;
$("spam-warning").className = "spam-warning active";
setTimeout(function () {
isSpamBlocked = false;
$("spam-warning").className = "spam-warning";
counter.count = 0;
counter.windowStart = new Date().getTime();
}, SPAM_BLOCK_DURATION);
return false;
}
return true;
}
};

var ChatManager = {
trimMessages: function (chatId) {
if (chats && chats[chatId] && chats[chatId].messages && chats[chatId].messages.length > MAX_MESSAGES_PER_CHAT) {
chats[chatId].messages = chats[chatId].messages.slice(-MAX_MESSAGES_PER_CHAT);
}
},
addMessage: function (msg) {
if (!chats || !chats[activeChatId]) return;
if (!chats[activeChatId].messages) chats[activeChatId].messages = [];
chats[activeChatId].messages.push(msg);
ChatManager.trimMessages(activeChatId);
chats[activeChatId].lastActivity = new Date().getTime();
Storage.saveChats();
UI.scheduleRender();
UI.renderChatList();
},
getLastMessageText: function (chat) {
if (!chat || !chat.messages || chat.messages.length === 0) return "Нет сообщений";
var last = chat.messages[chat.messages.length - 1];
if (last.type === "file") {
return "🎙️ Голосовое сообщение";
}
return last.text || "";
}
};

var UI = {
showModal: function (id) { $(id).className = "modal-overlay active"; },
hideModal: function (id) { $(id).className = "modal-overlay"; },
scheduleRender: function () {
if (renderQueued) return;
renderQueued = true;
setTimeout(function () {
UI.renderActiveChat();
renderQueued = false;
}, 16);
},
updateMyProfileDisplay: function () {
if (!myProfile) {
$("my-display-name").textContent = "Создайте профиль";
$("my-username").textContent = "";
$("my-id-display").textContent = myId || "...";
$("my-avatar").textContent = "?";
return;
}
var fullName = (myProfile.firstName || "") + " " + (myProfile.lastName || "");
$("my-display-name").textContent = fullName.trim() || "Без имени";
$("my-username").textContent = Utils.formatUsername(myProfile.username);
$("my-id-display").textContent = myId;
if (myProfile.avatar) {
$("my-avatar").innerHTML = '<img src="' + myProfile.avatar + '" alt="Avatar">';
} else {
var initials = ((myProfile.firstName || "?").charAt(0) + (myProfile.lastName || "").charAt(0)).toUpperCase();
$("my-avatar").textContent = initials || "?";
}
},
renderChatList: function () {
var list = $("chat-list");
list.innerHTML = "";
if (!chats) return;
var chatArr = Utils.objectValues(chats);
chatArr.sort(function (a, b) { return (b.lastActivity || 0) - (a.lastActivity || 0); });
if (chatArr.length === 0) {
list.innerHTML = '<div style="text-align:center;color:#8b9bb4;font-size:0.8rem;margin-top:20px;">Нет активных чатов</div>';
return;
}
for (var i = 0; i < chatArr.length; i++) {
var chat = chatArr[i];
var item = document.createElement("div");
item.className = "chat-item" + (chat.id === activeChatId ? " active" : "");
item.setAttribute("data-id", chat.id);
var avatarHtml = '<div class="avatar">' + (chat.name ? chat.name.charAt(0).toUpperCase() : "?") + "</div>";
if (chat.avatar) avatarHtml = '<div class="avatar"><img src="' + chat.avatar + '"></div>';
var lastMsg = ChatManager.getLastMessageText(chat);
var unreadHtml = chat.unreadCount ? '<span class="unread-badge">' + chat.unreadCount + "</span>" : "";
item.innerHTML = avatarHtml + '<div class="chat-details"><div class="chat-name">' + (chat.name || "Чат") + '</div><div class="chat-last-msg">' + lastMsg + "</div></div>" + unreadHtml;
item.onclick = function () {
var cid = this.getAttribute("data-id");
activeChatId = cid;
if (chats[cid]) chats[cid].unreadCount = 0;
UI.renderChatList();
UI.scheduleRender();
};
list.appendChild(item);
}
},
renderActiveChat: function () {
var container = $("chat-messages");
if (!activeChatId || !chats || !chats[activeChatId]) {
container.innerHTML = '<div class="empty-state" id="empty-state"><p style="font-size: 1.1rem; margin-bottom: 8px;">Добро пожаловать в PagooTalk</p><p style="font-size: 0.85rem;">Выберите чат или создайте новый</p></div>';
$("current-chat-name").textContent = "Выберите чат";
return;
}
var chat = chats[activeChatId];
var leaveBtnHtml = chat.isGroup ? '<button id="leave-group-btn" style="background:none; border:none; color:#ef4444; font-size:0.75rem; cursor:pointer; margin-left:8px;">Выйти</button>' : '';
$("current-chat-name").innerHTML = (chat.name || "Чат") + leaveBtnHtml;
if (chat.isGroup && $("leave-group-btn")) {
$("leave-group-btn").onclick = function(e) {
if(confirm("Вы уверены, что хотите выйти из этой группы?")) {
delete chats[activeChatId];
Storage.saveChats();
activeChatId = null;
UI.renderChatList();
UI.scheduleRender();
}
};
}
container.innerHTML = "";
var msgs = chat.messages || [];
if (msgs.length === 0) {
container.innerHTML = '<div style="text-align:center;color:#8b9bb4;font-size:0.85rem;margin-top:40px;">Нет сообщений. Отправьте первое!</div>';
return;
}
for (var i = 0; i < msgs.length; i++) {
var msg = msgs[i];
var bubble = document.createElement("div");
bubble.className = "message-bubble" + (msg.senderId === myId ? "" : " incoming");
var senderHtml = msg.senderId === myId ? "" : '<div class="message-sender">' + (msg.senderName || "Собеседник") + "</div>";
var contentHtml = "";
if (msg.type === "text") {
contentHtml = "<div>" + msg.text + "</div>";
} else if (msg.type === "file") {
contentHtml = '<audio src="' + msg.fileData + '" controls style="max-width:100%; height:40px;"></audio>';
}
var timeStr = "";
if (msg.timestamp) {
var d = new Date(msg.timestamp);
timeStr = ("0" + d.getHours()).slice(-2) + ":" + ("0" + d.getMinutes()).slice(-2);
}
bubble.innerHTML = senderHtml + contentHtml + '<div class="message-time">' + timeStr + "</div>";
container.appendChild(bubble);
}
container.scrollTop = container.scrollHeight;
}
};

if (isVoiceRecording) {
if (voiceRecorder && voiceRecorder.state !== "inactive") {
voiceRecorder.stop();
}
isVoiceRecording = false;
$("attach-btn").textContent = "🎙️";
} else {
var handleStream = function(stream) {
voiceChunks = [];
voiceRecorder = new window.MediaRecorder(stream);
voiceRecorder.ondataavailable = function (evt) {
if (evt.data.size > 0 || evt.data) voiceChunks.push(evt.data);
};
voiceRecorder.onstop = function () {
var blob = new Blob(voiceChunks, { type: "audio/ogg" });
var reader = new FileReader();
reader.onload = function (evt) {
var msg = { id: Utils.generateID(), senderId: myId, senderName: (myProfile ? (myProfile.firstName || "") : "Я"), type: "file", fileName: "voice.ogg", fileSize: blob.size, mimeType: "audio/ogg", fileData: evt.target.result, timestamp: new Date().getTime() };
ChatManager.addMessage(msg);
};
reader.readAsDataURL(blob);
if(stream.getTracks) {
var tracks = stream.getTracks();
for(var i=0; i<tracks.length; i++) tracks[i].stop();
}
};
voiceRecorder.start();
isVoiceRecording = true;
$("attach-btn").textContent = "✕";
};
var getUserMedia = (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) || navigator.webkitGetUserMedia || navigator.mozGetUserMedia || navigator.msGetUserMedia;
if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
navigator.mediaDevices.getUserMedia({ audio: true }).then(handleStream)['catch'](function(){});
} else if (getUserMedia) {
getUserMedia.call(navigator, { audio: true }, handleStream, function(){});
}
}
};

function startCallWorkflow(type) {
currentCallType = type;
$("group-call-overlay").className = "call-main-area active";
var getUserMedia = (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) || navigator.webkitGetUserMedia || navigator.mozGetUserMedia || navigator.msGetUserMedia;
var success = function(stream) {
localStream = stream;
isMicMuted = false;
isCamOff = type !== "video";
var localGrid = $("call-grid");
localGrid.innerHTML = "";
var tile = document.createElement("div");
tile.className = "video-tile";
var vid = document.createElement("video");
vid.srcObject = stream;
vid.autoplay = true;
vid.muted = true;
var pName = document.createElement("div");
pName.className = "participant-name";
pName.textContent = (myProfile ? myProfile.firstName : "Я") + " (Вы)";
tile.appendChild(vid);
tile.appendChild(pName);
localGrid.appendChild(tile);
$("participant-count").textContent = "1";
$("participant-list").innerHTML = '<div class="participant-item">👤 ' + (myProfile ? myProfile.firstName : "Я") + "</div>";
};
if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
navigator.mediaDevices.getUserMedia({ audio: true, video: type === "video" }).then(success)['catch'](function(){ alert("Ошибка доступа"); });
} else if (getUserMedia) {
getUserMedia.call(navigator, { audio: true, video: type === "video" }, success, function(){ alert("Ошибка доступа"); });
}
}

$("btn-call-audio").onclick = function () { startCallWorkflow("audio"); };
$("btn-call-video").onclick = function () { startCallWorkflow("video"); };

$("btn-mic").onclick = function () {
if (!localStream) return;
isMicMuted = !isMicMuted;
var tracks = localStream.getAudioTracks();
for(var i=0; i<tracks.length; i++) tracks[i].enabled = !isMicMuted;
$("btn-mic").className = "control-btn" + (isMicMuted ? " muted" : "");
};

$("btn-cam").onclick = function () {
if (!localStream) return;
isCamOff = !isCamOff;
var tracks = localStream.getVideoTracks();
for(var i=0; i<tracks.length; i++) tracks[i].enabled = !isCamOff;
$("btn-cam").className = "control-btn" + (isCamOff ? " muted" : "");
};

$("btn-screen").onclick = function () {
if (!isScreenSharing) {
if(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) {
navigator.mediaDevices.getDisplayMedia({ video: true }).then(function (stream) {
screenStream = stream;
isScreenSharing = true;
$("btn-screen").className = "control-btn danger";
var localGrid = $("call-grid");
var tile = document.createElement("div");
tile.className = "video-tile video-tile-screen";
var vid = document.createElement("video");
vid.srcObject = stream;
vid.autoplay = true;
var badge = document.createElement("span");
badge.className = "screen-share-badge";
badge.textContent = "Экран";
var pName = document.createElement("div");
pName.className = "participant-name";
pName.textContent = "Ваш экран";
tile.appendChild(vid);
tile.appendChild(badge);
tile.appendChild(pName);
localGrid.appendChild(tile);
stream.getVideoTracks()[0].onended = function () {
stopScreenShare();
};
})['catch'](function(){});
}
} else {
stopScreenShare();
}
};

function stopScreenShare() {
if (screenStream) {
var tracks = screenStream.getTracks();
for(var i=0; i<tracks.length; i++) tracks[i].stop();
screenStream = null;
}
isScreenSharing = false;
$("btn-screen").className = "control-btn";
var scrTile = qs(".video-tile-screen", $("call-grid"));
if (scrTile) scrTile.parentNode.removeChild(scrTile);
}

$("btn-end-call").onclick = function () {
stopScreenShare();
if (localStream) {
var tracks = localStream.getTracks();
for(var i=0; i<tracks.length; i++) tracks[i].stop();
localStream = null;
}
$("group-call-overlay").className = "call-main-area";
$("call-grid").innerHTML = "";
};

$("end-call-x-btn").onclick = function () {
$("group-call-overlay").className = "call-main-area";
};

window.onload = initApp;
})();
</script>
</body>
</html>
