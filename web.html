<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PagooTalk</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: rgba(20, 10, 35, 0.75);
  --bg-secondary: #08020f;
  --bg-sidebar: rgba(30, 15, 55, 0.65);
  --bg-message-out: linear-gradient(135deg, #ff007f 0%, #7f00ff 100%);
  --bg-message-in: rgba(255, 255, 255, 0.1);
  --accent: #ff007f;
  --accent-blue: #00f0ff;
  --accent-gradient: linear-gradient(135deg, #00f0ff 0%, #7f00ff 50%, #ff007f 100%);
  --text-primary: #ffffff;
  --text-secondary: #c0b0e0;
  --text-muted: #7a6a9a;
  --online: #00ff66;
  --border: rgba(255, 255, 255, 0.15);
  --glow: 0 0 25px rgba(255, 0, 127, 0.5);
  --glow-blue: 0 0 25px rgba(0, 240, 255, 0.5);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Montserrat', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

body {
  height: 100vh;
  overflow: hidden;
  color: var(--text-primary);
  background: linear-gradient(45deg, #0f021a, #26053b, #051c38, #1a0215);
  background-size: 400% 400%;
  animation: dynamicBg 12s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
}

@keyframes dynamicBg {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); filter: blur(5px); }
  to { opacity: 1; transform: scale(1); filter: blur(0); }
}

@keyframes pulseNeon {
  0%, 100% { box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
  50% { box-shadow: 0 0 30px rgba(255, 0, 127, 0.8); }
}

.app-wrapper {
  width: 100%;
  height: 100vh;
  display: flex;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.sidebar {
  width: 380px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  z-index: 10;
}

.sidebar-header {
  padding: 24px;
  background: rgba(0, 0, 0, 0.2);
  border-bottom: 1px solid var(--border);
}

.brand-section {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.brand-title {
  font-size: 1.6rem;
  font-weight: 800;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 1px;
}

.nav-tabs {
  display: flex;
  gap: 10px;
  background: rgba(0, 0, 0, 0.3);
  padding: 6px;
  border-radius: 14px;
  border: 1px solid var(--border);
}

.nav-tab-btn {
  flex: 1;
  padding: 10px;
  background: transparent;
  border: none;
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.3s ease;
}

.nav-tab-btn.active {
  background: var(--accent-gradient);
  color: var(--text-primary);
  box-shadow: var(--glow);
}

.list-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.list-section {
  display: none;
}

.list-section.active {
  display: block;
  animation: scaleIn 0.3s ease forwards;
}

.item-card {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  border-radius: 18px;
  cursor: pointer;
  margin-bottom: 12px;
  transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

.item-card:hover {
  background: rgba(255, 255, 255, 0.08);
  transform: translateY(-2px);
  border-color: var(--accent-blue);
  box-shadow: 0 5px 15px rgba(0, 240, 255, 0.15);
}

.item-card.active {
  background: rgba(127, 0, 255, 0.2);
  border-color: var(--accent);
  box-shadow: var(--glow);
}

.item-avatar {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  background: var(--accent-gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1.2rem;
  color: var(--text-primary);
  position: relative;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.status-indicator {
  position: absolute;
  bottom: 2px;
  right: 2px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--text-muted);
  border: 2px solid var(--bg-secondary);
}

.status-indicator.online {
  background: var(--online);
  box-shadow: 0 0 10px var(--online);
}

.item-details {
  flex: 1;
  overflow: hidden;
}

.item-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.item-name {
  font-weight: 700;
  font-size: 0.95rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.item-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
}

.item-preview {
  font-size: 0.85rem;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 4px;
}

.badge-unread {
  background: var(--accent);
  color: white;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  box-shadow: var(--glow);
}

.action-bar {
  padding: 16px;
  background: rgba(0,0,0,0.2);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}

.btn-action {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 14px;
  font-weight: 700;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-action-primary {
  background: var(--accent-gradient);
  color: white;
  box-shadow: var(--glow);
}

.btn-action-primary:hover {
  transform: scale(1.03);
  box-shadow: 0 0 35px rgba(255, 0, 127, 0.7);
}

.btn-action-secondary {
  background: rgba(255, 255, 255, 0.06);
  color: var(--text-primary);
  border: 1px solid var(--border);
}

.btn-action-secondary:hover {
  background: rgba(255, 255, 255, 0.12);
  border-color: var(--accent-blue);
}

.main-content {
  flex: 1;
  background: var(--bg-primary);
  display: flex;
  flex-direction: column;
  position: relative;
  transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.empty-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  text-align: center;
}

.empty-icon {
  width: 100px;
  height: 100px;
  border-radius: 30px;
  background: var(--accent-gradient);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3rem;
  margin-bottom: 24px;
  box-shadow: var(--glow);
  animation: pulseNeon 3s infinite;
}

.empty-view h2 {
  font-weight: 800;
  margin-bottom: 12px;
  font-size: 1.8rem;
}

.empty-view p {
  color: var(--text-secondary);
  max-width: 400px;
  line-height: 1.6;
}

.chat-container {
  display: none;
  flex-direction: column;
  height: 100%;
  animation: scaleIn 0.35s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}

.chat-header {
  padding: 16px 24px;
  background: rgba(0, 0, 0, 0.25);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.chat-header-profile {
  display: flex;
  align-items: center;
  gap: 16px;
}

.btn-back {
  display: none;
  background: transparent;
  border: none;
  color: var(--text-primary);
  cursor: pointer;
  padding: 8px;
}

.chat-header-name {
  font-weight: 700;
  font-size: 1.1rem;
}

.chat-header-status {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.messages-viewport {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: rgba(0,0,0,0.15);
}

.message-row {
  display: flex;
  width: 100%;
}

.message-row.outbound {
  justify-content: flex-end;
}

.message-row.inbound {
  justify-content: flex-start;
}

.msg-bubble {
  max-width: 65%;
  padding: 14px 18px;
  border-radius: 22px;
  position: relative;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  animation: scaleIn 0.25s ease forwards;
  word-wrap: break-word;
}

.message-row.outbound .msg-bubble {
  background: var(--bg-message-out);
  color: white;
  border-bottom-right-radius: 4px;
  box-shadow: var(--glow);
}

.message-row.inbound .msg-bubble {
  background: var(--bg-message-in);
  color: var(--text-primary);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
}

.msg-author {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent-blue);
  margin-bottom: 4px;
}

.msg-timestamp {
  font-size: 0.65rem;
  color: rgba(255,255,255,0.5);
  margin-top: 6px;
  text-align: right;
}

.input-bar {
  padding: 20px 24px;
  background: rgba(0, 0, 0, 0.3);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
}

.input-field-wrapper {
  flex: 1;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 4px 6px;
  display: flex;
  align-items: center;
  transition: all 0.3s ease;
}

.input-field-wrapper:focus-within {
  border-color: var(--accent-blue);
  box-shadow: var(--glow-blue);
  background: rgba(255, 255, 255, 0.09);
}

.input-field-wrapper input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 10px 12px;
  color: white;
  font-size: 0.95rem;
  outline: none;
}

.btn-send {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: var(--accent-gradient);
  border: none;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--glow);
  transition: all 0.3s ease;
}

.btn-send:hover {
  transform: scale(1.05) rotate(-5deg);
  box-shadow: 0 0 30px rgba(255,0,127,0.8);
}

.overlay-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(5, 2, 15, 0.85);
  backdrop-filter: blur(12px);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: all 0.4s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.overlay-modal.visible {
  opacity: 1;
  pointer-events: all;
}

.modal-content-box {
  width: 460px;
  max-width: 90vw;
  background: rgba(25, 12, 45, 0.95);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px;
  box-shadow: var(--glow);
  transform: scale(0.9);
  transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.overlay-modal.visible .modal-content-box {
  transform: scale(1);
}

.modal-title {
  font-size: 1.3rem;
  font-weight: 800;
  margin-bottom: 16px;
  background: var(--accent-gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--accent-blue);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-group input {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border);
  border-radius: 14px;
  color: white;
  outline: none;
  font-size: 0.95rem;
  transition: all 0.3s ease;
}

.form-group input:focus {
  border-color: var(--accent);
  box-shadow: var(--glow);
}

.code-display-area {
  background: rgba(0,0,0,0.4);
  padding: 14px;
  border-radius: 14px;
  border: 1px solid var(--border);
  font-family: monospace;
  font-size: 0.85rem;
  word-break: break-all;
  color: var(--accent-blue);
  user-select: all;
  margin-bottom: 12px;
  text-align: center;
}

.modal-actions-row {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 24px;
}

.call-window {
  position: fixed;
  background: rgba(20, 10, 35, 0.98);
  border: 1px solid var(--border);
  box-shadow: var(--glow);
  z-index: 999;
  display: none;
  flex-direction: column;
  transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
}

.call-window.maximized {
  top: 15px;
  left: 15px;
  right: 15px;
  bottom: 15px;
  width: calc(100% - 30px);
  height: calc(100% - 30px);
  border-radius: 24px;
  padding: 24px;
}

.call-window.minimized {
  bottom: 20px;
  right: 20px;
  width: 340px;
  height: 260px;
  border-radius: 16px;
  padding: 14px;
  top: auto;
  left: auto;
}

#videoGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  background: #04010a;
  padding: 15px;
  border-radius: 16px;
  overflow-y: auto;
  flex: 1;
  margin-bottom: 15px;
  border: 1px solid var(--border);
}

.call-window.minimized #videoGrid {
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 6px;
  padding: 8px;
}

#videoGrid video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  background: #110822;
  border: 1px solid rgba(255,255,255,0.1);
}

@media (max-width: 768px) {
  .sidebar {
    width: 100%;
  }
  .sidebar.hidden {
    transform: translateX(-100%);
    position: absolute;
  }
  .main-content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transform: translateX(100%);
  }
  .main-content.visible {
    transform: translateX(0);
  }
  .btn-back {
    display: inline-flex;
  }
}
</style>
</head>
<body>

<div class="app-wrapper">

  <div class="sidebar" id="appSidebar">
    <div class="sidebar-header">
      <div class="brand-section">
        <h1 class="brand-title">PagooTalk</h1>
        <button class="btn-action btn-action-secondary" id="btnMyCode" style="padding: 6px 12px; border-radius: 10px; font-size: 0.75rem;">Код личной переписки</button>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab-btn active" id="tabChats">Чаты</button>
        <button class="nav-tab-btn" id="tabGroups">Группы</button>
      </div>
    </div>

    <div class="list-container">
      <div class="list-section active" id="sectionChats"></div>
      <div class="list-section" id="sectionGroups"></div>
    </div>

    <div class="action-bar">
      <button class="btn-action btn-action-primary" id="btnCreateAction">Добавить</button>
    </div>
  </div>

  <div class="main-content" id="appMainContent">
    <div class="empty-view" id="emptyView">
      <div class="empty-icon">P</div>
      <h2>Начните общение</h2>
      <p>Используйте код личной переписки, создавайте децентрализованные группы и общайтесь напрямую через P2P со звонками.</p>
    </div>

    <div class="chat-container" id="chatContainer">
      <div class="chat-header">
        <div class="chat-header-profile">
          <button class="btn-back" id="btnBackToSidebar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          </button>
          <div class="item-avatar" id="activeChatAvatar">?</div>
          <div>
            <div class="chat-header-name" id="activeChatName">Загрузка...</div>
            <div class="chat-header-status" id="activeChatStatus">офлайн</div>
          </div>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
          <button class="btn-action btn-action-secondary" id="btnCopyGroupId" style="display: none; padding: 8px 12px; font-size: 0.75rem; border-color: var(--accent-blue);">Скопировать ID группы</button>
          <button class="btn-action btn-action-secondary" id="btnAudioCall" style="padding: 8px 12px; font-size: 0.75rem;">Аудиозвонок</button>
          <button class="btn-action btn-action-primary" id="btnVideoCall" style="padding: 8px 12px; font-size: 0.75rem;">Видеозвонок</button>
        </div>
      </div>

      <div class="messages-viewport" id="messagesViewport"></div>

      <div class="input-bar">
        <div class="input-field-wrapper">
          <input type="text" id="messageInputField" placeholder="Напишите сообщение...">
        </div>
        <button class="btn-send" id="btnSendMessage">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>
  </div>

</div>

<div class="overlay-modal" id="modalAdd">
  <div class="modal-content-box">
    <h3 class="modal-title" id="modalAddTitle">Подключить диалог</h3>
    <div id="modalAddBody"></div>
    <div class="modal-actions-row">
      <button class="btn-action btn-action-secondary" id="btnCancelModal">Отмена</button>
      <button class="btn-action btn-action-primary" id="btnConfirmModal">Готово</button>
    </div>
  </div>
</div>

<div class="call-window" id="callWindow">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
    <h3 class="modal-title" id="callTitle" style="margin-bottom: 0; font-size: 1.1rem;">P2P Звонок</h3>
    <button class="btn-action btn-action-secondary" id="btnSizeToggle" style="padding: 6px 12px; font-size: 0.75rem; width: auto; flex: none;">Свернуть</button>
  </div>
  <div id="videoGrid"></div>
  <div class="modal-actions-row" style="justify-content: center; gap: 12px; margin-top: 0;">
    <button class="btn-action btn-action-secondary" id="btnToggleAudio" style="max-width: 120px;">Микр. Вкл</button>
    <button class="btn-action btn-action-secondary" id="btnToggleVideo" style="max-width: 120px;">Камера Вкл</button>
    <button class="btn-action btn-action-primary" id="btnEndCall" style="background: linear-gradient(135deg, #ff0055 0%, #aa0033 100%); max-width: 150px;">Завершить</button>
  </div>
</div>

<div class="overlay-modal" id="incomingCallOverlay">
  <div class="modal-content-box" style="text-align: center; max-width: 380px;">
    <h3 class="modal-title">Входящий вызов</h3>
    <p id="incomingCallText" style="color: var(--text-secondary); margin-bottom: 20px;">Вам звонят...</p>
    <div class="modal-actions-row" style="justify-content: center; gap: 12px; margin-top: 10px;">
      <button class="btn-action btn-action-primary" id="btnAnswerCall">Ответить</button>
      <button class="btn-action btn-action-secondary" id="btnDeclineCall" style="background: #ff0055; color: white; border: none;">Отклонить</button>
    </div>
  </div>
</div>

<script>
var myId = localStorage.getItem('pagootalk_peer_id_43');
if (!myId || myId.length !== 43) {
  var possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  myId = '';
  for (var i = 0; i < 43; i++) {
    myId += possible.charAt(Math.floor(Math.random() * possible.length));
  }
  localStorage.setItem('pagootalk_peer_id_43', myId);
}

var chats = JSON.parse(localStorage.getItem('pagootalk_chats_data') || '{}');
var groups = JSON.parse(localStorage.getItem('pagootalk_groups_data') || '{}');
var currentActiveType = 'chat';
var currentTargetId = null;
var activeConnections = {};

var localStream = null;
var activeCalls = {};
var currentIncomingCallInfo = null;
var pendingCallObject = null;

var peer = new Peer(myId, {
  config: {
    iceServers: [
      { urls: 'stun:stun.tatneft.ru:3478' },
      { urls: 'stun:stun.sipnet.ru:3478' },
      { urls: 'stun:stun.tagan.ru:3478' },
      { urls: 'stun:stun.skylink.ru:3478' },
      { urls: 'stun:stun.services.mozilla.com:3478' },
      { urls: 'stun:stun.l.google.com:19302' }
    ]
  }
});

peer.on('open', function(id) {
  setInterval(heartbeat, 2500);
});

peer.on('connection', function(conn) {
  setupConnectionHandlers(conn);
});

peer.on('call', function(call) {
  activeCalls[call.peer] = call;
  if (localStream) {
    call.answer(localStream);
    attachCallEvents(call);
  } else {
    pendingCallObject = call;
  }
});

function setupConnectionHandlers(conn) {
  activeConnections[conn.peer] = conn;
  conn.on('data', function(data) {
    handleIncomingData(data, conn.peer);
  });
  conn.on('close', function() {
    delete activeConnections[conn.peer];
    renderLists();
    updateHeaderStatus();
  });
  conn.on('error', function() {
    delete activeConnections[conn.peer];
  });
}

function transmitData(targetId, packet) {
  var conn = activeConnections[targetId];
  if (conn && conn.open) {
    conn.send(packet);
  } else {
    conn = peer.connect(targetId, { reliable: true });
    activeConnections[targetId] = conn;
    conn.on('open', function() {
      conn.send(packet);
    });
    conn.on('data', function(data) {
      handleIncomingData(data, targetId);
    });
    conn.on('close', function() {
      delete activeConnections[targetId];
      renderLists();
      updateHeaderStatus();
    });
    conn.on('error', function() {
      delete activeConnections[targetId];
    });
  }
}

function handleIncomingData(data, senderPeerId) {
  if (!data) return;

  if (data.type === 'msg') {
    var now = new Date();
    var timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    var msgRecord = {
      id: data.id,
      sender: data.sender,
      alias: data.alias,
      text: data.text,
      time: data.time || timeStr
    };

    if (data.chatType === 'personal') {
      if (!chats[data.sender]) {
        chats[data.sender] = { id: data.sender, alias: data.alias, messages: [], unread: 0 };
      }
      var exists = chats[data.sender].messages.some(function(m) { return m.id === data.id; });
      if (!exists) {
        chats[data.sender].messages.push(msgRecord);
        if (currentTargetId !== data.sender || currentActiveType !== 'chat') {
          chats[data.sender].unread = (chats[data.sender].unread || 0) + 1;
        }
      }
    } else if (data.chatType === 'group') {
      if (!groups[data.groupId]) {
        groups[data.groupId] = { id: data.groupId, title: data.groupTitle || 'Группа', messages: [], unread: 0, members: [myId, data.sender] };
      }
      var existsG = groups[data.groupId].messages.some(function(m) { return m.id === data.id; });
      if (!existsG) {
        groups[data.groupId].messages.push(msgRecord);
        if (currentTargetId !== data.groupId || currentActiveType !== 'group') {
          groups[data.groupId].unread = (groups[data.groupId].unread || 0) + 1;
        }
      }
      if (groups[data.groupId].members.indexOf(data.sender) === -1) {
        groups[data.groupId].members.push(data.sender);
      }
    }
    saveData();
    renderLists();
    if (currentTargetId === (data.chatType === 'personal' ? data.sender : data.groupId) && currentActiveType === (data.chatType === 'personal' ? 'chat' : 'group')) {
      renderMessages();
    }
  } else if (data.type === 'group_join') {
    if (groups[data.groupId]) {
      if (groups[data.groupId].members.indexOf(data.userCode) === -1) {
        groups[data.groupId].members.push(data.userCode);
        saveData();
      }
      groups[data.groupId].members.forEach(function(mId) {
        transmitData(mId, { type: 'group_update', group: groups[data.groupId] });
      });
    }
  } else if (data.type === 'group_update') {
    groups[data.group.id] = data.group;
    saveData();
    renderLists();
    if (currentTargetId === data.group.id && currentActiveType === 'group') {
      renderMessages();
      updateHeaderStatus();
    }
  } else if (data.type === 'call_invite') {
    currentIncomingCallInfo = data;
    currentIncomingCallInfo.senderPeerId = senderPeerId;
    document.getElementById('incomingCallText').innerText = data.isGroup ? 'Входящий групповой вызов' : 'Входящий вызов от ' + senderPeerId.substring(0, 6) + '...';
    document.getElementById('incomingCallOverlay').classList.add('visible');
  } else if (data.type === 'call_terminate') {
    terminateCallTracks();
  }
}

function heartbeat() {
  localStorage.setItem('pagootalk_hb_' + myId, Date.now().toString());
  Object.keys(chats).forEach(function(cid) {
    var lastHb = localStorage.getItem('pagootalk_hb_' + cid);
    var isOnline = false;
    if (lastHb && (Date.now() - parseInt(lastHb) < 6500)) {
      isOnline = true;
    }
    if (chats[cid].isOnline !== isOnline) {
      chats[cid].isOnline = isOnline;
      renderLists();
      if (currentTargetId === cid && currentActiveType === 'chat') {
        updateHeaderStatus();
      }
    }
  });
}

function saveData() {
  localStorage.setItem('pagootalk_chats_data', JSON.stringify(chats));
  localStorage.setItem('pagootalk_groups_data', JSON.stringify(groups));
}

function renderLists() {
  var chatSection = document.getElementById('sectionChats');
  chatSection.innerHTML = '';
  Object.keys(chats).forEach(function(cid) {
    var c = chats[cid];
    var lastMsg = c.messages.length > 0 ? c.messages[c.messages.length - 1] : null;
    var previewText = lastMsg ? lastMsg.text : 'Нет сообщений';
    var timeText = lastMsg ? lastMsg.time : '';
    var activeClass = (currentTargetId === cid && currentActiveType === 'chat') ? 'active' : '';
    var statusClass = c.isOnline ? 'online' : '';
    var badge = c.unread > 0 ? '<div class="badge-unread">' + c.unread + '</div>' : '';

    var card = document.createElement('div');
    card.className = 'item-card ' + activeClass;
    card.innerHTML = '<div class="item-avatar">' + c.alias.charAt(0).toUpperCase() + '<div class="status-indicator ' + statusClass + '"></div></div>' +
                     '<div class="item-details">' +
                     '  <div class="item-row"><div class="item-name">' + c.alias + '</div><div class="item-meta">' + timeText + '</div></div>' +
                     '  <div class="item-row" style="margin-top:4px;"><div class="item-preview">' + previewText + '</div>' + badge + '</div>' +
                     '</div>';
    card.onclick = function() { selectTarget(cid, 'chat'); };
    chatSection.appendChild(card);
  });

  var groupSection = document.getElementById('sectionGroups');
  groupSection.innerHTML = '';
  Object.keys(groups).forEach(function(gid) {
    var g = groups[gid];
    var lastMsg = g.messages.length > 0 ? g.messages[g.messages.length - 1] : null;
    var previewText = lastMsg ? (lastMsg.alias + ': ' + lastMsg.text) : 'Нет сообщений';
    var timeText = lastMsg ? lastMsg.time : '';
    var activeClass = (currentTargetId === gid && currentActiveType === 'group') ? 'active' : '';
    var badge = g.unread > 0 ? '<div class="badge-unread">' + g.unread + '</div>' : '';

    var card = document.createElement('div');
    card.className = 'item-card ' + activeClass;
    card.innerHTML = '<div class="item-avatar" style="background:linear-gradient(135deg, #00f0ff, #7f00ff)">#</div>' +
                     '<div class="item-details">' +
                     '  <div class="item-row"><div class="item-name">' + g.title + '</div><div class="item-meta">' + timeText + '</div></div>' +
                     '  <div class="item-row" style="margin-top:4px;"><div class="item-preview">' + previewText + '</div>' + badge + '</div>' +
                     '</div>';
    card.onclick = function() { selectTarget(gid, 'group'); };
    groupSection.appendChild(card);
  });
}

function selectTarget(id, type) {
  currentTargetId = id;
  currentActiveType = type;

  if (type === 'chat') {
    chats[id].unread = 0;
    document.getElementById('btnCopyGroupId').style.display = 'none';
  } else {
    groups[id].unread = 0;
    document.getElementById('btnCopyGroupId').style.display = 'inline-flex';
  }
  saveData();

  document.getElementById('emptyView').style.display = 'none';
  document.getElementById('chatContainer').style.display = 'flex';

  if (window.innerWidth <= 768) {
    document.getElementById('appSidebar').classList.add('hidden');
    document.getElementById('appMainContent').classList.add('visible');
  }

  var targetName = type === 'chat' ? chats[id].alias : groups[id].title;
  var avatarLetter = type === 'chat' ? targetName.charAt(0).toUpperCase() : '#';

  document.getElementById('activeChatName').innerText = targetName;
  document.getElementById('activeChatAvatar').innerText = avatarLetter;

  updateHeaderStatus();
  renderMessages();
  renderLists();
}

function updateHeaderStatus() {
  var statusEl = document.getElementById('activeChatStatus');
  if (currentActiveType === 'chat') {
    if (chats[currentTargetId] && chats[currentTargetId].isOnline) {
      statusEl.innerText = 'в сети';
      statusEl.style.color = 'var(--online)';
    } else {
      statusEl.innerText = 'офлайн';
      statusEl.style.color = 'var(--text-muted)';
    }
  } else {
    var count = (groups[currentTargetId] && groups[currentTargetId].members) ? groups[currentTargetId].members.length : 1;
    statusEl.innerText = count + ' участников';
    statusEl.style.color = 'var(--accent-blue)';
  }
}

function renderMessages() {
  var container = document.getElementById('messagesViewport');
  container.innerHTML = '';
  if (!currentTargetId) return;

  var list = currentActiveType === 'chat' ? chats[currentTargetId].messages : groups[currentTargetId].messages;
  list.forEach(function(m) {
    var row = document.createElement('div');
    var isOut = m.sender === myId;
    row.className = 'message-row ' + (isOut ? 'outbound' : 'inbound');
    var authorMarkup = (!isOut && currentActiveType === 'group') ? '<div class="msg-author">' + m.alias + '</div>' : '';

    row.innerHTML = '<div class="msg-bubble">' +
                    authorMarkup +
                    '<div style="font-size:0.95rem; line-height:1.4;">' + escapeHtml(m.text) + '</div>' +
                    '<div class="msg-timestamp">' + m.time + '</div>' +
                    '</div>';
    container.appendChild(row);
  });
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function transmitMessage() {
  var input = document.getElementById('messageInputField');
  var text = input.value.trim();
  if (!text || !currentTargetId) return;

  var now = new Date();
  var timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
  var msgId = 'msg_' + Math.random().toString(36).substring(2, 11) + Date.now();
  
  var msgPayload = {
    id: msgId,
    sender: myId,
    alias: 'Пользователь ' + myId.substring(0, 4),
    text: text,
    time: timeStr
  };

  if (currentActiveType === 'chat') {
    chats[currentTargetId].messages.push(msgPayload);
    saveData();
    renderMessages();
    renderLists();
    transmitData(currentTargetId, { type: 'msg', chatType: 'personal', id: msgId, text: text, sender: myId, alias: 'Пользователь ' + myId.substring(0, 4), time: timeStr });
  } else {
    groups[currentTargetId].messages.push(msgPayload);
    saveData();
    renderMessages();
    renderLists();
    groups[currentTargetId].members.forEach(function(mId) {
      if (mId !== myId) {
        transmitData(mId, { type: 'msg', chatType: 'group', groupId: currentTargetId, groupTitle: groups[currentTargetId].title, id: msgId, text: text, sender: myId, alias: 'Пользователь ' + myId.substring(0, 4), time: timeStr });
      }
    });
  }
  input.value = '';
}

function renderLocalStream() {
  if (document.getElementById('localVideoElement')) return;
  var localVid = document.createElement('video');
  localVid.id = 'localVideoElement';
  localVid.srcObject = localStream;
  localVid.autoplay = true;
  localVid.muted = true;
  localVid.setAttribute('playsinline', 'true');
  document.getElementById('videoGrid').appendChild(localVid);
}

function launchCall(isVideo) {
  navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo }).then(function(stream) {
    localStream = stream;
    var win = document.getElementById('callWindow');
    win.style.display = 'flex';
    win.className = 'call-window maximized';
    document.getElementById('btnSizeToggle').innerText = 'Свернуть';
    renderLocalStream();

    if (currentActiveType === 'chat') {
      transmitData(currentTargetId, { type: 'call_invite', callType: isVideo ? 'video' : 'audio', isGroup: false });
      var call = peer.call(currentTargetId, stream);
      attachCallEvents(call);
    } else {
      groups[currentTargetId].members.forEach(function(mId) {
        if (mId !== myId) {
          transmitData(mId, { type: 'call_invite', callType: isVideo ? 'video' : 'audio', isGroup: true, groupId: currentTargetId });
          if (myId < mId) {
            var call = peer.call(mId, stream);
            attachCallEvents(call);
          }
        }
      });
    }
  }).catch(function(err) {
    alert('Ошибка мультимедиа: ' + err.message);
  });
}

function attachCallEvents(call) {
  activeCalls[call.peer] = call;
  call.on('stream', function(remoteStream) {
    var remoteVid = document.getElementById('video_' + call.peer);
    if (!remoteVid) {
      remoteVid = document.createElement('video');
      remoteVid.id = 'video_' + call.peer;
      remoteVid.autoplay = true;
      remoteVid.setAttribute('playsinline', 'true');
      document.getElementById('videoGrid').appendChild(remoteVid);
    }
    remoteVid.srcObject = remoteStream;
    remoteVid.play().catch(function(){});
  });
  call.on('close', function() {
    removeCallVideo(call.peer);
  });
  call.on('error', function() {
    removeCallVideo(call.peer);
  });
}

function removeCallVideo(peerId) {
  var vid = document.getElementById('video_' + peerId);
  if (vid) vid.remove();
  delete activeCalls[peerId];
}

document.getElementById('btnAnswerCall').onclick = function() {
  document.getElementById('incomingCallOverlay').classList.remove('visible');
  var isVideo = currentIncomingCallInfo && currentIncomingCallInfo.callType === 'video';
  
  navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo }).then(function(stream) {
    localStream = stream;
    var win = document.getElementById('callWindow');
    win.style.display = 'flex';
    win.className = 'call-window maximized';
    document.getElementById('btnSizeToggle').innerText = 'Свернуть';
    renderLocalStream();

    if (pendingCallObject) {
      pendingCallObject.answer(stream);
      attachCallEvents(pendingCallObject);
      pendingCallObject = null;
    }

    if (currentIncomingCallInfo && currentIncomingCallInfo.isGroup) {
      var gId = currentIncomingCallInfo.groupId;
      if (groups[gId]) {
        groups[gId].members.forEach(function(mId) {
          if (mId !== myId && myId < mId && !activeCalls[mId]) {
            var call = peer.call(mId, stream);
            attachCallEvents(call);
          }
        });
      }
    }
  }).catch(function(err) {
    alert('Ошибка мультимедиа при ответе: ' + err.message);
  });
};

document.getElementById('btnDeclineCall').onclick = function() {
  document.getElementById('incomingCallOverlay').classList.remove('visible');
  if (pendingCallObject) {
    pendingCallObject.close();
    pendingCallObject = null;
  }
  if (currentIncomingCallInfo) {
    transmitData(currentIncomingCallInfo.senderPeerId, { type: 'call_terminate' });
    currentIncomingCallInfo = null;
  }
};

function terminateCallTracks() {
  if (localStream) {
    localStream.getTracks().forEach(function(t) { t.stop(); });
    localStream = null;
  }
  Object.keys(activeCalls).forEach(function(k) {
    if (activeCalls[k]) activeCalls[k].close();
  });
  activeCalls = {};
  pendingCallObject = null;
  document.getElementById('videoGrid').innerHTML = '';
  document.getElementById('callWindow').style.display = 'none';
}

document.getElementById('btnEndCall').onclick = function() {
  if (currentTargetId) {
    if (currentActiveType === 'chat') {
      transmitData(currentTargetId, { type: 'call_terminate' });
    } else if (groups[currentTargetId]) {
      groups[currentTargetId].members.forEach(function(mId) {
        if (mId !== myId) transmitData(mId, { type: 'call_terminate' });
      });
    }
  }
  terminateCallTracks();
};

document.getElementById('btnSizeToggle').onclick = function() {
  var win = document.getElementById('callWindow');
  if (win.classList.contains('maximized')) {
    win.classList.remove('maximized');
    win.classList.add('minimized');
    document.getElementById('btnSizeToggle').innerText = 'Развернуть';
  } else {
    win.classList.remove('minimized');
    win.classList.add('maximized');
    document.getElementById('btnSizeToggle').innerText = 'Свернуть';
  }
};

document.getElementById('btnToggleAudio').onclick = function() {
  if (localStream && localStream.getAudioTracks().length > 0) {
    var state = localStream.getAudioTracks()[0].enabled;
    localStream.getAudioTracks()[0].enabled = !state;
    document.getElementById('btnToggleAudio').innerText = !state ? 'Микр. Вкл' : 'Микр. Выкл';
  }
};

document.getElementById('btnToggleVideo').onclick = function() {
  if (localStream && localStream.getVideoTracks().length > 0) {
    var state = localStream.getVideoTracks()[0].enabled;
    localStream.getVideoTracks()[0].enabled = !state;
    document.getElementById('btnToggleVideo').innerText = !state ? 'Камера Вкл' : 'Камера Выкл';
  }
};

document.getElementById('btnAudioCall').onclick = function() { launchCall(false); };
document.getElementById('btnVideoCall').onclick = function() { launchCall(true); };

document.getElementById('btnCopyGroupId').onclick = function() {
  if (currentActiveType === 'group' && currentTargetId) {
    navigator.clipboard.writeText(currentTargetId).then(function() {
      alert('ID группы скопирован в буфер обмена!');
    });
  }
};

document.getElementById('tabChats').onclick = function() {
  document.getElementById('tabChats').classList.add('active');
  document.getElementById('tabGroups').classList.remove('active');
  document.getElementById('sectionChats').classList.add('active');
  document.getElementById('sectionGroups').classList.remove('active');
};

document.getElementById('tabGroups').onclick = function() {
  document.getElementById('tabGroups').classList.add('active');
  document.getElementById('tabChats').classList.remove('active');
  document.getElementById('sectionGroups').classList.add('active');
  document.getElementById('sectionChats').classList.remove('active');
};

document.getElementById('btnMyCode').onclick = function() {
  document.getElementById('modalAddTitle').innerText = 'Код личной переписки';
  document.getElementById('modalAddBody').innerHTML = '<p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:12px;">Передайте этот код собеседнику, чтобы он смог добавить вас и начать прямой диалог.</p>' +
                                                       '<div class="code-display-area">' + myId + '</div>';
  document.getElementById('btnConfirmModal').style.display = 'none';
  document.getElementById('modalAdd').classList.add('visible');
};

document.getElementById('btnCreateAction').onclick = function() {
  var activeTab = document.getElementById('tabChats').classList.contains('active') ? 'chat' : 'group';
  if (activeTab === 'chat') {
    document.getElementById('modalAddTitle').innerText = 'Добавить по коду переписки';
    document.getElementById('modalAddBody').innerHTML = '<div class="form-group">' +
                                                         '  <label>Код личной переписки (43 символа)</label>' +
                                                         '  <input type="text" id="targetCodeField" placeholder="Вставьте код..." maxlength="43">' +
                                                         '</div>' +
                                                         '<div class="form-group">' +
                                                         '  <label>Имя контакта</label>' +
                                                         '  <input type="text" id="targetAliasField" placeholder="Например: Николай">' +
                                                         '</div>';
  } else {
    document.getElementById('modalAddTitle').innerText = 'Управление группами';
    document.getElementById('modalAddBody').innerHTML = '<div class="form-group">' +
                                                         '  <label>Для создания: введите название новой группы</label>' +
                                                         '  <input type="text" id="groupTitleField" placeholder="Например: Дизайнеры">' +
                                                         '</div>' +
                                                         '<div class="form-group">' +
                                                         '  <label>Для входа: введите ID существующей группы</label>' +
                                                         '  <input type="text" id="groupJoinIdField" placeholder="Вставьте ID группы...">' +
                                                         '</div>';
  }
  document.getElementById('btnConfirmModal').style.display = 'inline-flex';
  document.getElementById('modalAdd').classList.add('visible');
};

document.getElementById('btnCancelModal').onclick = function() {
  document.getElementById('modalAdd').classList.remove('visible');
};

document.getElementById('btnConfirmModal').onclick = function() {
  var isChat = document.getElementById('targetCodeField') !== null;
  if (isChat) {
    var code = document.getElementById('targetCodeField').value.trim();
    var alias = document.getElementById('targetAliasField').value.trim() || 'Чат ' + code.substring(0, 5);
    if (code.length === 43) {
      if (!chats[code]) {
        chats[code] = { id: code, alias: alias, messages: [], unread: 0 };
        saveData();
      }
      document.getElementById('modalAdd').classList.remove('visible');
      selectTarget(code, 'chat');
      transmitData(code, { type: 'ping' });
    } else {
      alert('Код личной переписки должен содержать ровно 43 символа!');
    }
  } else {
    var title = document.getElementById('groupTitleField').value.trim();
    var joinId = document.getElementById('groupJoinIdField').value.trim();

    if (title) {
      var gId = 'GRP-' + myId + '-' + Math.random().toString(36).substring(2, 12);
      groups[gId] = { id: gId, title: title, messages: [], unread: 0, members: [myId] };
      saveData();
      document.getElementById('modalAdd').classList.remove('visible');
      selectTarget(gId, 'group');
    } else if (joinId) {
      var parts = joinId.split('-');
      if (parts.length >= 3 && parts[0] === 'GRP') {
        var creatorId = parts[1];
        if (!groups[joinId]) {
          groups[joinId] = { id: joinId, title: 'Группа ' + joinId.substring(4, 9), messages: [], unread: 0, members: [myId, creatorId] };
          saveData();
        }
        document.getElementById('modalAdd').classList.remove('visible');
        selectTarget(joinId, 'group');
        transmitData(creatorId, { type: 'group_join', groupId: joinId, userCode: myId });
      } else {
        alert('Неверный формат ID группы!');
      }
    }
  }
};

document.getElementById('btnSendMessage').onclick = transmitMessage;
document.getElementById('messageInputField').onkeydown = function(e) {
  if (e.key === 'Enter') transmitMessage();
};

document.getElementById('btnBackToSidebar').onclick = function() {
  document.getElementById('appMainContent').classList.remove('visible');
  document.getElementById('appSidebar').classList.remove('hidden');
  currentTargetId = null;
  renderLists();
};

renderLists();
</script>
